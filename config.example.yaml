# Copy to a local file and point TELOS_CONFIG at it. Any field can also be
# overridden by a TELOS_* env var (e.g. TELOS_NATS_URL).
service: telos-world
env: dev
log_level: info

postgres:
  dsn: postgres://telos:telos@localhost:5432/telosmud?sslmode=disable
redis:
  addr: localhost:6379
nats:
  url: nats://localhost:4222

# Operator-tunable engine limits (#368). Every field is optional; omitting one (or leaving it 0) uses the
# compiled-in default, so an untouched deployment behaves exactly as it always has.
#
# These are validated FAIL-CLOSED at boot: a value the engine cannot honor refuses the start and names the
# constraint, rather than being silently clamped to something you did not choose.
#
# Not every timeout in the engine is here, deliberately. Several have ordering invariants — the adopt-confirm
# deadline must cover the handoff pending TTL, the drain-reservation TTL is derived from the drain deadline —
# and a plausible-looking value for one of those would break an invariant a test exists to pin. What is
# exposed are bounds whose only relationship is to the workload.
# Both lines below are COMMENTED OUT on purpose. Setting a value here PINS it: future default changes stop
# reaching you, and an explicit lua_call_deadline_ms defeats the automatic `-race` scaling described below,
# because it is the unset-means-default sentinel that routes to it.
tunables:
  # The per-call Lua VM instruction cap: the PRIMARY bound on a content script, and what stops a runaway loop
  # from stalling a zone's actor goroutine — which on this engine means stalling every player in that zone.
  # Default 100000. Range 1000..10000000. Env: TELOS_LUA_INSTR_BUDGET
  #
  # It must also be REACHABLE within the deadline below — the engine refuses a pair where the wall clock
  # would always fire first, because a budget that never fires does not merely do nothing: every runaway then
  # looks like a transient deadline abort, which the circuit breaker weights 5x more lightly and stops
  # quarantining. Budget/20000 is the milliseconds you need, so a 200000 budget needs at least 10ms.
  #
  # That ratio is measured, not nominal: real throughput is ~90k instructions/ms for a tight arithmetic loop
  # and ~37k/ms for anything allocating tables, and the engine calibrates below both so the check is honest
  # on slower cores too.
  #
  # Raising the budget therefore costs wall clock, and wall clock is the real budget: the deadline must stay
  # under the 250ms zone pulse (telos-world refuses otherwise), because a call that outlives a pulse stops
  # combat rounds and affect ticks landing for every player in that zone. Consider also that instructions
  # allocate: with the string amplifiers separately capped (#438), a call's table growth is roughly linear in
  # instructions at ~140 bytes each, so this ceiling buys ~1.4 GB of table growth per concurrent call and the
  # 100000 default buys ~14 MB. Raising the budget is therefore buying memory as well as time.
  #
  # Raise it if legitimate content is aborting with "instruction budget exceeded"; that message names the
  # script, so check the script is not accidentally unbounded before raising the ceiling for everyone.
  # lua_instr_budget: 100000

  # The per-call Lua wall-clock deadline in milliseconds: the SECONDARY guard, catching stalls the instruction
  # count cannot see (a GC pause, host load, a slow builtin). Default 5 (automatically scaled up in `-race`
  # builds, whose instrumentation makes every VM op ~10x slower). Range 1..1000.
  # Env: TELOS_LUA_CALL_DEADLINE_MS
  #
  # Raising this is the usual need on a busy or noisy host. LOWERING it below what a legitimate builtin needs
  # spuriously aborts correct scripts, which is why there is a floor.
  # lua_call_deadline_ms: 5
