name: ci

on:
  push:
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Generated *.pb.go is gitignored; produce it before building.
      - uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.71.0
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - run: buf generate
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./... -race

  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          lint: true
          format: true
          push: false
