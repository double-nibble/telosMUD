name: ci

on:
  push:
  pull_request:

# Least privilege for every job (CodeQL actions/missing-workflow-permissions): CI only checks out
# code and reads the token for rate limits — nothing writes back to the repo.
permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Generated *.pb.go is gitignored; produce it before building.
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1
        with:
          version: 1.71.0
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - run: buf generate
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"
          cache: true
      - run: go vet ./...
      # gofmt is not enforced by `go vet`; a dirty file slipped in unnoticed before this check.
      - run: test -z "$(gofmt -l .)" || { echo "gofmt needed:"; gofmt -l .; exit 1; }
      - run: go build ./...
      # The default suite is hermetic: the gated Postgres integration tier (tests/integration
      # + internal/store) t.Skip without TELOS_TEST_DSN, so this run never needs a database.
      - run: go test ./... -race

  # Linting (the project TEST STANDARD: golangci-lint run, locally before commit and in CI).
  # BLOCKING: the codebase is clean against .golangci.yml (gosec+revive enabled). The first
  # triage's classes were resolved (fixed in code, config-excluded for test-only RNG/teardown,
  # or carry an explicit reasoned //nolint with a TODO(owner) for the domain follow-ups).
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1
        with:
          version: 1.71.0
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - run: buf generate
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"
          cache: true
      # golangci-lint v2 requires golangci-lint-action v7+ (v6 only supports the v1 line and
      # errors with "golangci-lint v2 is not supported by golangci-lint-action v6").
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.12.2

  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1
        with:
          lint: true
          format: true
          push: false
          # PR comments need pull-requests:write; disabled to keep the workflow at contents:read.
          pr_comment: false

  # Gated Postgres integration tests (tests/integration + the co-located
  # internal/store/*_test.go). The hermetic `go` job above SKIPs these (they t.Skip
  # unless TELOS_TEST_DSN is set), so they were the layer that let the seed/deletePack
  # idempotency bug ship. This job stands up a real Postgres and exports TELOS_TEST_DSN
  # so they actually RUN, including TestImportPackIdempotent (the seed-regression:
  # import the demo pack twice).
  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: telos
          POSTGRES_PASSWORD: telos
          POSTGRES_DB: telosmud
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U telos -d telosmud"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      TELOS_TEST_DSN: postgres://telos:telos@localhost:5432/telosmud?sslmode=disable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1
        with:
          version: 1.71.0
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - run: buf generate
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"
          cache: true
      # The tests migrate the schema themselves (db.Migrate) before each gated test.
      - run: go test -count=1 ./tests/integration/... ./internal/store/... -v

  # Gated real-NATS comms integration. The commbus + contentbus packages carry gated tests
  # (TELOS_NATS_URL) that t.Skip without a broker — so the hermetic `go` job never runs them, and
  # they were effectively DEAD in CI: the JetStream-real test had latently rotted (an invalid dotted
  # consumer name + a constant idempotency key) precisely because nothing ran it against a real broker.
  # This job starts NATS WITH JetStream (-js, mirroring deploy/docker-compose.yml) and exports
  # TELOS_NATS_URL so the real-transport tests actually run — the layer that catches MemJetStream-vs-NATS
  # divergences (consumer-name validation, stream-wide publish dedup, durable offline→online delivery).
  comms:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1
        with:
          version: 1.71.0
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - run: buf generate
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"
          cache: true
      # Service containers can't override the image CMD to pass -js, so run NATS as a step.
      - name: start NATS with JetStream
        run: |
          docker run -d --name nats -p 4222:4222 nats:2.10-alpine -js
          for i in $(seq 1 20); do
            if nc -z 127.0.0.1 4222; then echo "nats up"; break; fi; sleep 0.5;
          done
      - name: gated comms integration (real NATS + JetStream)
        env:
          TELOS_NATS_URL: nats://127.0.0.1:4222
        run: go test -count=1 ./internal/commbus/... ./internal/contentbus/... ./internal/scopebus/... -v

  # Whole-stack smoke: the cheapest catch for the seed-class bug. Brings the docker
  # compose stack up TWICE against the same Postgres volume (the populated-volume
  # re-seed that originally collided), asserts every service is healthy, the seed
  # one-shot exits 0, and a telnet client can connect and `look`.
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: make smoke-twice

  # Black-box e2e (tests/e2e, built with -tags e2e): bring the FULL stack up, then drive
  # a real telnet client through the cross-shard journey and assert the player-visible
  # output. This is the committed CI catch for the lookRoom render regression (commit
  # 98b69a6 — a mob silently skipped in `look`). Generated *.pb.go is gitignored, so the
  # compose build needs the proto; `make up` builds the images (which run buf inside).
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1
        with:
          version: 1.71.0
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - run: buf generate
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"
          cache: true
      # Bring the full stack up (postgres, redis, nats, migrate, seed, both world shards,
      # gate). Reuse the smoke harness's readiness wait so the gate + both shards are
      # registered before the e2e dials — then run the e2e tier and always tear down.
      - name: bring up the stack and wait for the gate
        run: SMOKE_KEEP=1 ./tests/smoke/smoke.sh
      - name: run the e2e tier
        run: make test-e2e
      - name: tear down the stack
        if: always()
        run: docker compose -f deploy/docker-compose.yml down -v
