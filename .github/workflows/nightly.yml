name: nightly

# The SLOW test tier that does not belong on every push: long active fuzzing now, and the home for
# the W9 stress/soak suite later. Runs on a daily schedule and on manual dispatch. Per-commit CI
# (ci.yml) stays fast — it runs each fuzz target's SEED corpus (the Fuzz funcs are unit tests of their
# seeds) but never the mutation search; this tier runs the active fuzzer for a real time budget.
on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily
  workflow_dispatch:
    inputs:
      fuzztime:
        description: "Active-fuzz budget PER target (Go duration, e.g. 300s, 10m)"
        required: false
        default: "300s"
      soak_cycles:
        description: "Soak churn cycles (TELOS_SOAK_CYCLES)"
        required: false
        default: "100000"

# Least privilege for every job (CodeQL actions/missing-workflow-permissions): the nightly tier only
# checks out code and reads the token for rate limits — nothing writes back to the repo.
permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Generated *.pb.go is gitignored; produce it before building (mirrors ci.yml).
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1
        with:
          version: 1.71.0
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - run: buf generate
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"
          cache: true
      # Run every Fuzz* target's active fuzzer for the budget (default 300s/target; dispatch can
      # override). A new crasher fails the job; the failing input is uploaded below for reproduction.
      - name: active fuzz (each target)
        run: make fuzz FUZZTIME=${{ github.event.inputs.fuzztime || '300s' }}
      # On a finding, Go writes the minimized crasher under <pkg>/testdata/fuzz/<Target>/. Upload it so
      # the failure is reproducible locally with `go test -run=<Target>/<id>` after downloading.
      - name: upload fuzz crashers on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fuzz-crashers
          path: "**/testdata/fuzz/**"
          if-no-files-found: ignore

  # W9 stress/soak: a deep churn + concurrent-load pass under -race (TELOS_SOAK gated; per-commit CI
  # skips it). Catches lifecycle/leak/wedge bugs that only surface over thousands of cycles.
  soak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1
        with:
          version: 1.71.0
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - run: buf generate
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"
          cache: true
      - name: soak (deep churn under -race)
        run: make soak SOAK_CYCLES=${{ github.event.inputs.soak_cycles || '100000' }}
