# CodeQL ADVANCED setup (replaces GitHub's default setup, which cannot run a pre-build step).
# This repo gitignores the generated protobuf packages (api/gen/**/*.pb.go — see the repo policy:
# `buf generate` on a fresh checkout), so a default-setup scan cannot resolve them: the Go extractor
# degrades ("could not import …/play/v1", cascading to "no metadata for time" / "undefined: Zone")
# and every analysis covers only a PARTIAL program. Here we `buf generate` before the Go analysis,
# exactly like ci.yml, so CodeQL sees the same program CI builds.
name: CodeQL

# Runs ONLY for PRs into main and on merges to main (the weekly re-scan cron was dropped by owner
# decision — the tradeoff: CodeQL query-pack updates won't re-scan UNCHANGED code until the next
# merge; workflow_dispatch stays as the manual recovery hatch, it never fires on its own).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload the SARIF results
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: autobuild
          - language: actions
            build-mode: none
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Generated *.pb.go is gitignored; produce it BEFORE CodeQL's autobuild (mirrors ci.yml).
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1
        if: matrix.language == 'go'
        with:
          version: 1.71.0
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - run: buf generate
        if: matrix.language == 'go'
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        if: matrix.language == 'go'
        with:
          go-version: "1.25"
          cache: true
      - uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # security-and-quality keeps the QUALITY findings the Code Quality preview surfaced,
          # now against a fully-extracted program instead of the degraded default-setup build.
          queries: security-and-quality
      - uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          category: "/language:${{ matrix.language }}"
