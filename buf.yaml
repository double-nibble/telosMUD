version: v2
modules:
  - path: api/proto
lint:
  use:
    - STANDARD
  except:
    # The Play service uses a single bidirectional stream of frames rather than
    # per-method request/response messages; relax the RPC naming rules for it.
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
    # Services are intentionally named Play/Handoff (docs/PROTOCOL.md), not
    # *Service; the suffix would be redundant and churn the generated API.
    - SERVICE_SUFFIX
breaking:
  use:
    - FILE
