name: telosmud-dev

# Local development dependencies. Data lives under deploy/data/ (gitignored).
#   make up   -> start    make down -> stop    make logs -> tail

# Phase 16: services export OTLP metrics to the otel-collector (merge *otel into a service's environment).
# The 5s export interval (default is 60s) keeps the :8889 scrape fresh during sub-minute load runs.
x-otel-env: &otel-env
  OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
  OTEL_EXPORTER_OTLP_INSECURE: "true"
  OTEL_METRIC_EXPORT_INTERVAL: "5000"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-telos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telos}
      POSTGRES_DB: ${POSTGRES_DB:-telosmud}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-telos} -d ${POSTGRES_DB:-telosmud}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    # -js enables JetStream (durable cross-scope events); -m exposes monitoring.
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  # OpenTelemetry Collector (Phase 16): the worlds + gates push OTLP metrics here (see *otel-env). It re-exposes
  # them on a Prometheus endpoint — `curl localhost:8889/metrics` while a load run is in flight to watch the tick
  # lag / occupancy / drop counters. `docker compose logs otel-collector` shows a metric summary too.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC ingest
      - "8889:8889" # Prometheus scrape endpoint
    restart: unless-stopped

  # One-shot: apply the embedded goose migrations (the schema), then exit. Runs before any
  # world boots so the shards never race migrations (the migration is advisory-locked too).
  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: telos-migrate
    environment:
      TELOS_POSTGRES_DSN: postgres://${POSTGRES_USER:-telos}:${POSTGRES_PASSWORD:-telos}@postgres:5432/${POSTGRES_DB:-telosmud}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # One-shot: import the demo content pack (pack='demo') into the definition rows, then exit.
  # Content is DATA, not a migration (decision D4), so it runs after migrate, before worlds.
  seed:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: telos-seed
    environment:
      TELOS_POSTGRES_DSN: postgres://${POSTGRES_USER:-telos}:${POSTGRES_PASSWORD:-telos}@postgres:5432/${POSTGRES_DB:-telosmud}?sslmode=disable
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  world:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: telos-world
    environment:
      <<: *otel-env
      TELOS_SERVICE: telos-world
      TELOS_ENV: dev
      TELOS_WORLD_LISTEN: ":9090"
      TELOS_SHARD_ADDR: world:9090
      TELOS_SHARD_ID: shard-a # MUST be unique per world process (ARCHITECTURE.md §4)
      TELOS_ZONES: midgaard
      TELOS_POSTGRES_DSN: postgres://${POSTGRES_USER:-telos}:${POSTGRES_PASSWORD:-telos}@postgres:5432/${POSTGRES_DB:-telosmud}?sslmode=disable
      TELOS_REDIS_ADDR: redis:6379
      TELOS_NATS_URL: nats://nats:4222
      DEBUG: true
    expose:
      - "9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    restart: unless-stopped

  # Second shard: hosts the darkwood zone. The midgaard shard hands players off to
  # it (and back) across the market<->grove cross-shard exit.
  world-darkwood:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: telos-world
    environment:
      <<: *otel-env
      TELOS_SERVICE: telos-world
      TELOS_ENV: dev
      TELOS_WORLD_LISTEN: ":9090"
      TELOS_SHARD_ADDR: world-darkwood:9090
      TELOS_SHARD_ID: shard-b # distinct id: both worlds defaulting to shard-1 collide
      TELOS_ZONES: darkwood
      TELOS_POSTGRES_DSN: postgres://${POSTGRES_USER:-telos}:${POSTGRES_PASSWORD:-telos}@postgres:5432/${POSTGRES_DB:-telosmud}?sslmode=disable
      TELOS_REDIS_ADDR: redis:6379
      TELOS_NATS_URL: nats://nats:4222
      DEBUG: true
    expose:
      - "9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    restart: unless-stopped

  world-crypt:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: telos-world
    environment:
      <<: *otel-env
      TELOS_SERVICE: telos-world
      TELOS_ENV: dev
      TELOS_WORLD_LISTEN: ":9090"
      TELOS_SHARD_ADDR: world-crypt:9090
      TELOS_SHARD_ID: shard-c # MUST be unique per world process (ARCHITECTURE.md §4)
      TELOS_ZONES: crypt
      TELOS_POSTGRES_DSN: postgres://${POSTGRES_USER:-telos}:${POSTGRES_PASSWORD:-telos}@postgres:5432/${POSTGRES_DB:-telosmud}?sslmode=disable
      TELOS_REDIS_ADDR: redis:6379
      TELOS_NATS_URL: nats://nats:4222
      DEBUG: true
    expose:
      - "9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    restart: unless-stopped


  # telos-account: the accounts/auth gRPC API + the OAuth website (Phase 14). The website (:8080) is the
  # GitHub sign-in + dashboard + "Play" link-code bridge. GitHub OAuth credentials come from the GITIGNORED
  # deploy/auth.local.env (required:false so CI — which has no such file — still parses; the site then just
  # shows "sign-in not configured"). The gate is intentionally NOT pointed here yet (it keeps stub login), so
  # the smoke/e2e telnet path is unchanged; full gate<->account login is the Phase 14 capstone.
  account:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: telos-account
    env_file:
      - path: ./auth.local.env
        required: false
    environment:
      TELOS_SERVICE: telos-account
      TELOS_ENV: dev
      TELOS_ACCOUNT_LISTEN: ":9100"
      TELOS_POSTGRES_DSN: postgres://${POSTGRES_USER:-telos}:${POSTGRES_PASSWORD:-telos}@postgres:5432/${POSTGRES_DB:-telosmud}?sslmode=disable
      TELOS_REDIS_ADDR: redis:6379 # link codes + device-auth sessions
      TELOS_WEB_LISTEN: ":8080"
      TELOS_WEB_PUBLIC_URL: http://localhost:8080 # the broker's public base — the /login link + OAuth callback derive from it
      TELOS_WEB_SECURE_COOKIES: "0" # dev serves over plain http://localhost; prod (TLS) keeps the secure-by-default
      DEBUG: true
    ports:
      - "8080:8080" # website: open http://localhost:8080 to sign in
    expose:
      - "9100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    restart: unless-stopped

  gate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: telos-gate
    environment:
      <<: *otel-env
      TELOS_SERVICE: telos-gate
      TELOS_ENV: dev
      TELOS_GATE_LISTEN: ":4000"
      TELOS_GATE_ALLOW_PLAINTEXT: "1" # dev: the smoke/e2e telnet tests use the plain :4000 listener (prod defaults to TLS-only)
      TELOS_ACCOUNT_TARGET: account:9100 # account-backed (Phase 15): OAuth-only in prod
      TELOS_DEV_AUTOAUTH: "1" # DEV/TEST ONLY: bypass the browser OAuth with the bare name login so smoke/e2e stay headless
      TELOS_WORLD_TARGET: world:9090 # fallback if the directory is unreachable
      TELOS_REDIS_ADDR: redis:6379 # directory: resolve the home shard on login
      TELOS_ZONES: midgaard # players spawn in midgaard
      DEBUG: true
    ports:
      - "4000:4000" # telnet: connect with `telnet localhost 4000` (dev-autoauth: just type a name)
    depends_on:
      world:
        condition: service_started
      world-darkwood:
        condition: service_started
    restart: unless-stopped

  # gate-auth: the ACCOUNT-BACKED front door (Phase 14 capstone). Identical to `gate` but pointed at
  # telos-account (TELOS_ACCOUNT_TARGET), so it prompts for a LINK CODE / passphrase instead of a bare name —
  # this is the endpoint that completes the web->telnet loop (sign in on the website -> Play -> get a code ->
  # `connect <code>` here). It is ADDITIVE: the plain `gate` stays name-only so the smoke/e2e suite (which
  # does `connect <Name>`) is unaffected. Telnet to localhost:4001.
  gate-auth:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: telos-gate
    environment:
      <<: *otel-env
      TELOS_SERVICE: telos-gate
      TELOS_ENV: dev
      TELOS_GATE_LISTEN: ":4001"
      TELOS_GATE_ALLOW_PLAINTEXT: "1" # dev: plain telnet so you can test the link-code login by hand
      TELOS_ACCOUNT_TARGET: account:9100 # account-backed login (link code / passphrase)
      TELOS_WORLD_TARGET: world:9090
      TELOS_REDIS_ADDR: redis:6379
      TELOS_ZONES: midgaard
      DEBUG: true
    ports:
      - "4001:4001" # telnet: connect with `telnet localhost 4001`, then enter your link code
    depends_on:
      world:
        condition: service_started
      world-darkwood:
        condition: service_started
      account:
        condition: service_started
    restart: unless-stopped
