name: telosmud-dev

# Local development dependencies. Data lives under deploy/data/ (gitignored).
#   make up   -> start    make down -> stop    make logs -> tail

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-telos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telos}
      POSTGRES_DB: ${POSTGRES_DB:-telosmud}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-telos} -d ${POSTGRES_DB:-telosmud}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    # -js enables JetStream (durable cross-scope events); -m exposes monitoring.
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  world:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: telos-world
    environment:
      TELOS_SERVICE: telos-world
      TELOS_ENV: dev
      TELOS_WORLD_LISTEN: ":9090"
      TELOS_SHARD_ADDR: world:9090
      TELOS_ZONES: midgaard
      TELOS_POSTGRES_DSN: postgres://${POSTGRES_USER:-telos}:${POSTGRES_PASSWORD:-telos}@postgres:5432/${POSTGRES_DB:-telosmud}?sslmode=disable
      TELOS_REDIS_ADDR: redis:6379
      TELOS_NATS_URL: nats://nats:4222
      DEBUG: true
    expose:
      - "9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  gate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: telos-gate
    environment:
      TELOS_SERVICE: telos-gate
      TELOS_ENV: dev
      TELOS_GATE_LISTEN: ":4000"
      TELOS_WORLD_TARGET: world:9090
      DEBUG: true
    ports:
      - "4000:4000" # telnet: connect with `telnet localhost 4000`
    depends_on:
      world:
        condition: service_started
    restart: unless-stopped
