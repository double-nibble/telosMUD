syntax = "proto3";

package telosmud.handoff.v1;

import "telosmud/common/v1/common.proto";

// Cross-shard player migration. Two-phase (Prepare/Commit) + epoch preserves the
// single-writer invariant under failure. See docs/PROTOCOL.md §2.
service Handoff {
  rpc Prepare(PrepareRequest) returns (PrepareResponse); // rehydrate in PENDING state
  rpc Commit(CommitRequest) returns (CommitResponse); // activate after gate re-attaches
  rpc Abort(AbortRequest) returns (AbortResponse); // roll back on failure/timeout
  // AdoptZone asks this shard to runtime-host a draining peer's zone (Phase 16.4b graceful drain), so the
  // source can then flip the lease (HandoverZone) and hand its players off into the zone here. Build-only:
  // it hosts + starts renewal; the caller owns the atomic lease flip that makes ShardForZone resolve here.
  rpc AdoptZone(AdoptZoneRequest) returns (AdoptZoneResponse);
}

message PrepareRequest {
  string session_id = 1;
  PlayerSnapshot snapshot = 2;
  string target_zone_id = 3;
  string target_room_id = 4;
  uint64 epoch = 5; // ownership epoch; destination records it
  string from_shard_id = 6;
  reserved 7; // applied_seq moved onto PlayerSnapshot (it is player freeze-state)
  // snapshot_sig authenticates the handoff as coming from a legitimate cluster shard and binds
  // the integrity-critical fields (character/epoch/target/state) so a network attacker cannot forge
  // a Prepare that injects an arbitrary state_json. It is an Ed25519 signature over a canonical
  // digest of those fields (see internal/world/handoffsig.go), verified at Prepare when the
  // destination has a handoff verify key configured. Empty when signing is unconfigured (dev/test),
  // in which case the destination does not enforce it — mirroring the session-assertion seam.
  bytes snapshot_sig = 8;
}

message PrepareResponse {
  string handoff_token = 1;
  string target_shard_addr = 2;
  uint64 pending_ttl_ms = 3;
}

message CommitRequest {
  string handoff_token = 1;
  // sig authenticates Commit with the SAME shared handoff keypair Prepare/AdoptZone use (#314). The
  // handoff_token is derived deterministically from (character, epoch) — both public — so it is NOT a
  // secret and cannot itself gate this RPC. sig is an Ed25519 signature over a canonical digest binding
  // the token AND to_shard_id under a Commit-specific domain separator (internal/world/handoffsig.go),
  // verified when the destination has a handoff verify key. Empty when signing is unconfigured (dev/test),
  // where the #260 keyless refusal governs instead.
  bytes sig = 2;
  // to_shard_id is the destination shard this Commit is addressed to, bound by sig and checked against the
  // receiver's own shard id (exactly as AdoptZone.to_shard_id, #314). It closes a same-token cross-shard
  // replay: two concurrent same-epoch handoffs of one character (a split-brain race) derive the IDENTICAL
  // token, so a signed Commit/Abort captured off the plaintext wire for destination D would otherwise be
  // replayable against a DIFFERENT destination D2 holding a live pending under the same token. Binding the
  // destination makes a signature minted for D worthless at D2.
  string to_shard_id = 3;
}

message CommitResponse {}

message AbortRequest {
  string handoff_token = 1;
  string reason = 2;
  // sig authenticates Abort exactly as CommitRequest.sig does (#314): an Ed25519 signature over the token
  // AND to_shard_id under an Abort-specific domain separator. Without it, anyone with network reach to a
  // world port could compute the guessable token and discard a pending handoff mid-flight (a targeted
  // disruption). reason is a log-only string and is intentionally NOT bound — rewriting it authorizes
  // nothing.
  bytes sig = 3;
  // to_shard_id binds the destination shard this Abort is addressed to (see CommitRequest.to_shard_id) so a
  // signed Abort for destination D cannot be replayed against a concurrent same-token pending at D2.
  string to_shard_id = 4;
}

message AbortResponse {}

message AdoptZoneRequest {
  string zone_id = 1; // the draining peer's zone this shard should build + run + start renewing
  // #262: AdoptZone drives HostZone + lease renewal, so an unauthenticated request is a forced-host /
  // lease-takeover / resource-exhaustion vector against any world port an attacker can reach. These
  // fields authenticate it with the SAME shared handoff keypair Prepare uses.
  //
  // A signature over zone_id ALONE would be replayable forever, so the digest also binds:
  //   - to_shard_id, so a signature captured for one shard cannot be replayed against another;
  //   - lease_gen, the zone lease's monotonic generation, which makes a replay UNREPRESENTABLE rather
  //     than merely time-bounded (#315).
  // from_shard_id names the requesting peer, binding the (from,to) pair and giving the audit a subject.
  string from_shard_id = 2;
  string to_shard_id = 3;
  // lease_gen is the zone lease's generation as the SOURCE observed it while still holding the lease
  // (#315). The directory increments it on every ownership CHANGE — a claim by a new owner, and the
  // HandoverZone flip that ends this very drain. The destination verifies it against the directory's
  // current generation, so the instant the flip lands, this request is dead: a captured AdoptZone can
  // never be replayed to force a rebuild.
  //
  // It supersedes issued_at_unix_ms (field 4, deprecated below).
  uint64 lease_gen = 6;
  // zone_sig is an Ed25519 signature over a canonical digest of the fields above (internal/world/
  // handoffsig.go), verified when the destination has a handoff verify key. Empty when signing is
  // unconfigured (dev/test), where the #260 keyless refusal governs instead.
  bytes zone_sig = 5;

  // DEPRECATED (#315), never read and never set. #262 bounded a replay by a 60s clock-skew window around
  // this issue time. That was weaker than it looked: a replay inside the window was harmless only by
  // accident, resting on HostZone's idempotence and on s.zones never being pruned; and it dragged a clock
  // dependence into the drain control plane, where a peer with >60s of drift became silently
  // undrainable-to. lease_gen replaces it with a fence a replay cannot get around.
  //
  // The field stays on the wire (rather than reserved) so an old peer's request still decodes during a
  // rolling upgrade. It is outside the signing digest, so setting it authorizes nothing. Do not reuse
  // field 4 for anything else.
  int64 issued_at_unix_ms = 4 [deprecated = true];
}

message AdoptZoneResponse {
  bool hosted = 1; // true once the zone is live on this shard (idempotent if already hosted)
}

// PlayerSnapshot is the authoritative in-memory player state carried in a
// handoff, so the destination resumes with zero DB round-trips.
message PlayerSnapshot {
  string character_id = 1;
  string account_id = 2;
  string name = 3;
  telosmud.common.v1.CoreStats stats = 4;
  telosmud.common.v1.Vitals vitals = 5;
  repeated telosmud.common.v1.Item inventory = 6;
  repeated telosmud.common.v1.Equipped equipment = 7;
  repeated telosmud.common.v1.Affect affects = 8;
  repeated telosmud.common.v1.SkillState skills = 9;
  map<string, string> flags = 10;
  uint64 state_version = 11; // optimistic-concurrency guard vs the DB
  // Highest input seq the source had APPLIED at freeze. The destination seeds its
  // dedup high-water mark from this and drops replayed lines with seq <= applied_seq,
  // tying the freeze-point to the gate's replay-point (Redirect.resume_input_seq).
  uint64 applied_seq = 12;
  // persist_id is the character's durable-row PersistID (characters.id), carried so the
  // DESTINATION can flush the player to the SAME durable row — without it a handed-off
  // session has no id to CAS on and a quit on the destination is silently not persisted
  // (the location never advances, so the next login routes back to the stale home_zone).
  // Empty in the async-create window (a brand-new char handed off BEFORE its CreateCharacter
  // returned the PID at the SOURCE); the destination then re-resolves it by name on bind
  // (the engine-universal crash-rehydrate primitive, docs/PERSISTENCE.md §6). Paired with
  // state_version (field 11): adopting the id and the CAS base together keeps a destination
  // save monotonic against the row.
  string persist_id = 13;
  // comms_state is the player's data-only comms-state subtree (Phase 8.6, P8-D7): the
  // per-channel enabled/disabled overrides, the ignore list, and the AFK flag/message,
  // marshalled as the same JSON the StateJSON.Comms subtree persists. It is carried on the
  // handoff so a cross-shard walk is comms-transparent: the destination re-publishes the
  // receiver's effective {enabled ∩ hearable} hear-set + ignore list to the gate from this
  // state, so toggles/ignores/AFK do not reset when the player changes shard. Empty for a
  // player with all-default comms state (the common case), which the destination loads as
  // defaults — identical to a pre-8.6 snapshot (the backward-compat default).
  string comms_state = 14;
  // state_json is the REMAINING StateJSON content subtree carried on the cross-shard handoff
  // (the full-state carry): inventory, equipment, attribute base overrides, resource currents,
  // affects (remaining durations), flags, cooldowns (remaining), and the player's data-only
  // self.state. It is the SAME marshalled JSON the durable characters.state row carries, MINUS
  // the comms subtree (field 14 is the single authority for comms — no double-writer) and the
  // tell delivered-cursor (session state, left out of scope). It is marshalled at the source
  // freeze point on the zone goroutine (race-free, like dumpCharacter) so a cross-shard walk
  // carries the player's whole mutable state; the destination's prepare re-installs it via the
  // SAME appliers loadCharacter uses (items into contents + Wearer slots, attribute bases,
  // resource currents clamped to the destination-derived max, affects re-attached with remaining
  // durations, cooldowns re-armed on the destination goroutine). Empty for a bare/contentless
  // player (the destination then resolves from defaults — identical to the pre-carry snapshot).
  // AppliedSeq is NOT routed through this subtree: the handoff seeds it from field 12 (a fresh
  // login restarts the input-dedup fence; a handoff keeps the same gate session).
  string state_json = 15;
  // tier is the player's account trust tier (#27/#106) — the value the world derives builder/admin/holylight
  // from. It rides the SIGNED handoff payload (bound by snapshot_sig, see internal/world/handoffsig.go), so it
  // is as trustworthy as the rest of the snapshot; the destination sets session.tier from it and re-derives the
  // reserved flags via applyTierFlags on activation. This is the SECURE replacement for carrying the reserved
  // flags themselves: those were removed from the flags map (H-1) because that map restores via the trusted
  // setFlag path and is not integrity-checked, so a forged snapshot could inject them; the tier, by contrast,
  // is only ever trusted from a signed source. Empty for a player at the baseline tier (the common case) — the
  // destination then applies no elevation, identical to the pre-#106 fail-closed behavior (a dropped tier).
  string tier = 16;
  // account is the player's ACCOUNT id (#72), carried so a cross-shard walk does not silently strip a
  // session's ability to enter an instanced zone. The instanced-zone caps are charged per ACCOUNT
  // (internal/world/instance.go: a per-character cap is routed around by alts, a per-script cap by one script
  // minting for many players), and the world sets session.account ONLY from a signature-checked source. Without
  // this field a player who walked from shard A to shard B would arrive with no account and be refused entry to
  // every dungeon until they relogged.
  //
  // It rides the SIGNED payload (bound by snapshot_sig) for the same reason the tier does, though the threat is
  // milder: the account grants no elevation and is never applied to the entity — it is purely an accounting key
  // — so forging it buys an attacker only the ability to charge someone else's instance quota (a
  // denial-of-service against that account's cap, and a false attribution in the mint logs). That is worth
  // signing but is not the tier's privilege-escalation class. An insecure keyless destination STRIPS it, exactly
  // as it strips the tier, so an unauthenticated Prepare can never plant one.
  //
  // Empty is a valid and safe value: the destination session then may not mint an instance, which is the same
  // fail-closed posture a dev/unverified login has.
  string account = 17;
  // aliases is the player's data-only command-alias subtree (#353): the per-character `alias`/`unalias`
  // expansion map, marshalled as the same JSON the StateJSON.Aliases subtree persists. It is a SESSION-scoped
  // durable subtree (like comms_state, field 14) — NOT part of the entity state_json (field 15) — so it rides
  // its OWN field. Carried on the handoff so a cross-shard walk is alias-transparent: a player's shortcuts do
  // not reset when they change shard. Empty for a player with no aliases (the common case), which the
  // destination loads as an empty map — identical to a pre-#353 snapshot (the backward-compat default). It is
  // DATA ONLY (a map of verb->expansion, both bounded-length player text re-fed to the parser as ordinary
  // input, no code/handles) and is bound by snapshot_sig like every other carried subtree.
  string aliases = 18;
}
