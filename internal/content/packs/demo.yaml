# The `demo` content pack — the midgaard + darkwood world, transcribed VERBATIM from the
# old internal/world/world.go newDemoZone()/defineTorch()/defineHelmet()/defineSword()/
# defineChest() Go authoring. This file is the source of truth for the demo world the unit
# tests load (embedded via internal/content/demo.go) and for `make seed` (imported into the
# Postgres `pack='demo'` rows for the live stack).
#
# HARD CONSTRAINT (Phase 4.1): the rendered demo world must stay byte-identical — room
# names, long descriptions, exit display order, item keywords/short/long, and the market
# floor item placements must match the old Go authoring exactly. The parity test
# (content_parity_test.go) diffs the prototypes this pack produces against newDemoZone's
# output before that authoring was deleted; keep it green when editing this file.
#
# Both demo zones (midgaard + darkwood) ship together so the cross-zone exit
# market --north--> darkwood:room:grove satisfies the exits.to_room FK when seeded.

pack: demo

# Pack-GLOBAL definitions (Phase 5.1, docs/ABILITIES.md §1): attributes/resources/damage-types are
# zone-independent — they belong to the pack, not to Midgaard. The engine knows the KIND; these rows
# give the instances. Stripping the pack (bare-engine boot) leaves zero of these and the server still
# runs — a stat read just returns 0.
attributes:
  # Primary stats: literal-base attributes (point-buy/level bases override these per character).
  - {ref: strength,     display_name: Strength,     value_kind: int, default_base: {lit: 10}}
  - {ref: intellect,    display_name: Intellect,    value_kind: int, default_base: {lit: 10}}
  - {ref: constitution, display_name: Constitution, value_kind: int, default_base: {lit: 10}}
  - {ref: level,        display_name: Level,         value_kind: int, default_base: {lit: 1}, min: 1}
  # Derived attributes: base is a prefix-AST formula evaluated against OTHER attrs (recursive).
  #   max_hp   = constitution*10 + level*5
  #   max_mana = intellect*8 + level*3
  - ref: max_hp
    display_name: Maximum Health
    value_kind: derived
    default_base:
      expr: ["+", ["*", ["attr", constitution], 10], ["*", ["attr", level], 5]]
    min: 1
  - ref: max_mana
    display_name: Maximum Mana
    value_kind: derived
    default_base:
      expr: ["+", ["*", ["attr", intellect], 8], ["*", ["attr", level], 3]]
    min: 0

  # --- Combat attributes (Phase 6.3a, docs/COMBAT.md §4) — the ROM-style conventional set. The ENGINE
  # names none of these; the swing pipeline runs whatever check/formula the combat profile authored,
  # and these are the attributes those formulas read. A pack with none = no combat (the bare case).
  # Offense:
  - {ref: accuracy,  display_name: Accuracy,  value_kind: int, default_base: {lit: 0}}
  - {ref: damroll,   display_name: Damage Roll, value_kind: int, default_base: {lit: 0}}
  - {ref: attacks,   display_name: Attacks per Round, value_kind: int, default_base: {lit: 1}, min: 1}
  - {ref: crit_mult, display_name: Critical Multiplier, value_kind: float, default_base: {lit: 2}}
  # unarmed_dice_num / unarmed_dice_size: the dice an entity's BARE-HANDED swing rolls when it wields no
  # weapon and carries no natural Weapon component (buildSwingDamageOp). A fresh, unarmed player would
  # otherwise deal bonus-only damage (~0 at STR 10); these give it a real 1d6 punch. CONTENT-OVERRIDABLE
  # via the normal mod-stack — a monk class / brass-knuckles affect raises them, NO engine predicate. The
  # engine substitutes a tiny default (1d3) only when a pack defines neither, so a bare pack still hits.
  - {ref: unarmed_dice_num,  display_name: Unarmed Dice Count, value_kind: int, default_base: {lit: 1}, min: 1}
  - {ref: unarmed_dice_size, display_name: Unarmed Dice Size,  value_kind: int, default_base: {lit: 6}, min: 1}
  # strength_bonus = (strength - 10) / 2  (5e-ish ability mod; the [G-A] damage bonus reads it). floor
  # via the int value_kind truncation in the formula evaluator's consumers; the swing adds it to damage.
  - ref: strength_bonus
    display_name: Strength Bonus
    value_kind: int
    default_base:
      expr: ["floor", ["/", ["-", ["attr", strength], 10], 2]]
  # Defense:
  - {ref: evasion, display_name: Evasion, value_kind: int, default_base: {lit: 10}}
  - {ref: dodge,   display_name: Dodge,   value_kind: int, default_base: {lit: 0}}
  # parry/block GATE on gear (a wielded weapon / a held shield) via deriving to 0 when ungeared ([G-C]);
  # this demo leaves them as flat content bases (a sword-wielding mob authors a positive parry directly).
  - {ref: parry, display_name: Parry, value_kind: int, default_base: {lit: 0}}
  - {ref: block, display_name: Block, value_kind: int, default_base: {lit: 0}}
  # soak_slash: flat slash-damage reduction ([G-B]). The swing's mitigate() subtracts soak_<type>; armor
  # would feed this through the mod-stack. A flat base here models a tough hide / worn plate.
  - {ref: soak_slash, display_name: Slash Soak, value_kind: int, default_base: {lit: 0}}
  # combat_order: the [G-G] iteration-order key the round driver sorts by (default 0 => simultaneous,
  # the gather order is preserved). An OnEnterCombat initiative check would write this; the demo leaves
  # it at 0 (no initiative) — the simultaneous default the acceptance gate validated.
  - {ref: combat_order, display_name: Combat Order, value_kind: int, default_base: {lit: 0}}
  # aggressive: a CONTENT flag (a number the engine reads, P6-D6) — a mob with aggressive > 0 initiates
  # combat on a player entering its room (death.go aggroOnEntry). Default 0 (passive); a mob's Living
  # block overrides it to 1. The engine never names "aggressive"; it reads whatever this attribute is.
  - {ref: aggressive, display_name: Aggressive, value_kind: int, default_base: {lit: 0}}
  # max_reactions: the cap on the per-round REACTION budget ([G9], Phase 6.4b). Default 0 => a creature
  # has NO reactions (no opportunity attacks); a mob's Living block overrides it (the goblin chief sets 1,
  # the 5e "one reaction per round" rule). The `reactions` resource's max derives from this — so only a
  # creature whose content grants reactions gets the OnLeaveRoom opportunity attack. The engine names no
  # "reactions"; it reads this attribute as the resource cap, exactly like max_hp caps hp.
  - {ref: max_reactions, display_name: Max Reactions, value_kind: int, default_base: {lit: 0}}
  # Saving-throw attributes ([G2]/[G12]): a target's DEX save bonus and a caster's spell save DC. These
  # are what a per-target `check` save (a fireball's save-for-half) reads — `$target.dex_save` vs
  # `$source.spell_dc`. The engine names neither; the check spec authored on the spell reads them.
  - ref: dex_save
    display_name: Dexterity Save
    value_kind: int
    default_base:
      expr: ["floor", ["/", ["-", ["attr", strength], 10], 2]]   # demo: reuse the STR-derived mod shape
  - {ref: spell_dc, display_name: Spell Save DC, value_kind: int, default_base: {lit: 13}}

resources:
  # hp is VITAL: at 0 = death. The on_depleted op-list is the [G-D] death hook (Phase 6.3b): the engine
  # runs it on the dying entity BEFORE die() drops combat / builds the corpse, then proceeds to death.
  # Here it is a pure narration (the engine's own "$n is DEAD!" room line still fires after). Its max is
  # the derived max_hp attribute, so anything that raises constitution/level/max_hp raises the cap.
  - ref: hp
    display_name: Health
    max_attr: max_hp
    vital: true
    regen: 1
    on_depleted:
      - {op: act, to: room, text: "$n collapses, lifeless."}
  - {ref: mana, display_name: Mana,   max_attr: max_mana, vital: false, regen: 1}
  # reactions: the per-round REACTION budget ([G9], Phase 6.4b) AND the carrier of the opportunity-attack
  # handler. `per_round: true` makes the round driver refill it to max (max_reactions) at the START of
  # every combat round, so a reactor gets a bounded number of reactions/round and a spent one does not
  # refill until next round — the SECOND flee in a round provokes nothing. on_event[OnLeaveRoom] is the
  # OPPORTUNITY ATTACK: when an engaged foe flees the room, the engine fires OnLeaveRoom about THIS
  # reactor (subject), with the fleer bound as `other`. The handler (a) checks a reaction is available
  # (`if reactions >= 1`), then (b) SPENDS it (modify_resource self reactions -1) and (c) lands a granted,
  # GATED swing on the fleer (deal_damage with target: other -> the same dealDamage/guardHarmful funnel
  # every harm uses, so a non-consenting player is NOT hit). Pure CONTENT — the engine names no OA.
  - ref: reactions
    display_name: Reactions
    max_attr: max_reactions
    vital: false
    per_round: true
    on_event:
      OnLeaveRoom:
        - op: if
          resource_min: {resource: reactions, min: 1}
          then:
            - {op: modify_resource, resource: reactions, amount: -1}
            - {op: act, to: actor, target: other, text: "$N tries to flee — you lunge with an opportunity attack!"}
            - {op: deal_damage, target: other, type: slash, dice_num: 1, dice_size: 6, bonus: ["attr", "$actor.strength_bonus"]}

damage_types:
  # A small resist matrix: slash resists slash a little (armor-ish), fire is neutral. The shared
  # mitigation pipeline (5.3) reads these; 5.1 only loads them. Multiplier <1 resist, >1 vuln, 0 immune.
  - {ref: slash, display_name: Slashing, color: white, resist: {slash: 0.9}}
  - {ref: fire,  display_name: Fire,     color: red,   resist: {fire: 1.0}}

# Affects (status effects, docs/ABILITIES.md §5). The engine's Affected runtime (Phase 5.2) owns their
# duration/stacking/tick/expire and feeds modifiers into derivation + prevents into the tag-CC gate.
# Durations are in PULSES. on_tick op-lists are RESERVED (5.3 wires the gated deal_damage); the tick
# MECHANISM (interval counting + the hook point) is live now.
affects:
  # weaken: a -2 strength debuff, refresh-stacking (a re-cast resets the timer). Exercises a modifier
  # feeding derivation and the refresh stacking mode.
  - ref: weaken
    name: Weakened
    category: curse
    stacking: refresh
    dispellable: true
    body:
      duration: 20
      modifiers:
        - {attr: strength, op: add, value: -2}

  # root: a movement-blocking CC. prevents the "move" tag (a tagged `walk` would be blocked at the
  # lifecycle step-3 gate in 5.3); the prevents-set query is testable standalone this slice.
  - ref: root
    name: Rooted
    category: snare
    stacking: refresh
    dispellable: true
    body:
      duration: 12
      prevents: [move]

  # web: a ROOM-SCOPED affect ([G13]). It attaches to the ROOM (not a creature), ticks over the room's
  # occupants, and lands on anyone who walks IN — rooting (prevents the `move` tag, the same tag-CC a
  # cast root uses) and slowing (-1 dodge) everyone caught in it. scope: room is the only new field; the
  # Affected runtime hosts it. duration 12 pulses; tick interval 2 re-leases the snare on occupants. A
  # web is transient (re-applied by content, never snapshotted).
  - ref: web
    name: Webbed
    category: snare
    scope: room
    stacking: refresh
    dispellable: true
    body:
      duration: 12
      modifiers:
        - {attr: dodge, op: add, value: -1}
      prevents: [move]
      tick:
        interval: 2

  # poison: the §5 example — a DoT. stacks up to 5 (magnitude scales), -2 strength while active, and
  # ticks every 6 pulses. The on_tick deal_damage op-list completes in 5.3 (RESERVED here); the
  # modifiers + stacking + tick interval are live now. Exercises the stack stacking mode.
  - ref: poison
    name: Poisoned
    category: poison
    stacking: stack
    max_stacks: 5
    stack_scope: source
    dispellable: true
    body:
      duration: 30
      modifiers:
        - {attr: strength, op: add, value: -2}
      tick:
        interval: 6
        # The DoT (Phase 5.3): a poison tick is just deal_damage, routed through the SAME gated
        # mitigation pipeline a cast uses. amount 4; the magnitude (stacks) scales it (effectCtx.mag),
        # so a 3-stack poison ticks 12. The damage type is "poison" (neutral — no resist matrix entry).
        on_tick:
          - {op: deal_damage, type: poison, amount: 4}

# Abilities (skills/spells, docs/ABILITIES.md §2). The engine provides the lifecycle + the effect-op
# vocabulary; THIS data is the whole skill — the engine has never heard of "fireball". Adding one is a
# content write, zero engine changes.
abilities:
  # fireball: THE Phase 5.3 milestone. A command-invocation spell, targets an enemy, costs 30 mana,
  # casts instantly (cast_time 0 -> straight to commit), then resolves [deal_damage fire, apply_affect
  # poison]. Its harmful disposition gates it vs a non-consenting player at BOTH choke points
  # (lifecycle step 4 + the in-op guard). 8d6 fire damage flows through the shared mitigation pipeline.
  - ref: fireball
    name: Fireball
    invocation: command
    words: [fireball]
    # [G12] AoE: targeting.area room makes fireball hit EVERY valid living target in the caster's room
    # (the caster is excluded — harmful self-exclusion). The engine loops the on_resolve PER TARGET, and
    # each target funnels guardHarmful INDEPENDENTLY (a consenting foe burns, a non-consenting player in
    # the room is unharmed). mode: enemy keeps the classic `fireball goblin` working, but with an area
    # the keyword is optional — a bare `fireball` blankets the room.
    targeting: {mode: enemy, scope: room, range: 0, disposition: harmful, area: room}
    tags: [cast, verbal, somatic, fire]
    costs:
      - {resource: mana, amount: 30}
    cast_time: 0
    lag: 12
    cooldown: 0
    messages:
      actor: "You hurl a roaring fireball into the room!"
      room: "$n hurls a roaring fireball into the room!"
    # The whole on_resolve is ONE area-scoped `check` op: per target, roll a DEX save vs the caster's
    # spell DC; the save HALVES the damage (the half/full bands). Each target rolls its OWN save and its
    # damage gates on its OWN consent — the Phase-6 milestone "a fireball's save halves its damage across
    # everyone in the room", entirely from content. apply_affect (burn) on a failed save adds the rider.
    on_resolve:
      - op: check
        check:
          label: "Dexterity save"
          dice: "1d20"
          bonus: ["attr", "$target.dex_save"]
          vs: ["attr", "$source.spell_dc"]
          bands:
            # made the save (total >= DC, margin >= 0): HALF damage, no burn.
            - margin_min: 0
              label: save
              ops:
                - {op: deal_damage, type: fire, dice: "4d6"}
            # failed the save: FULL damage + a lingering burn (poison-as-fire DoT rider).
            - label: fail
              ops:
                - {op: deal_damage, type: fire, dice: "8d6"}
                - {op: apply_affect, affect: poison, harmful: true}

  # web: a command spell that conjures the `web` ROOM-scoped affect ([G13]) in the caster's room. mode
  # none (no creature target — the field IS the target); the apply_affect op detects the room-scoped def
  # and attaches it to the room (occupants + entrants get rooted). disposition harmful so the per-occupant
  # landing funnels the gate. No engine knowledge of "web" — the room affect + this ability are content.
  - ref: cast_web
    name: Web
    invocation: command
    words: [web]
    targeting: {mode: none, scope: room, range: 0, disposition: harmful}
    tags: [cast, somatic]
    costs:
      - {resource: mana, amount: 15}
    cast_time: 0
    lag: 12
    cooldown: 0
    messages:
      actor: "You fling a tangle of sticky webs across the room!"
      room: "$n flings a tangle of sticky webs across the room!"
    on_resolve:
      - {op: apply_affect, affect: web}

# Combat profiles (Phase 6.3a, docs/COMBAT.md §3) — the ROM-style to-hit / avoidance / damage SHAPE as
# pure content. The engine runs the pipeline; THIS data is the whole ruleset. `default_combat` names the
# profile a player fights with; a mob names its own via its `living.combat_profile`.
default_combat: melee

combat_profiles:
  - ref: melee
    # TO-HIT: a d20 attack roll + accuracy vs the target's evasion. Bands (top-down, first match wins):
    #   nat-20 -> crit (faceEq, independent of total) ; nat-1 -> miss ; margin>=0 -> hit ; else miss.
    # The engine reads only the band LABEL (crit/miss/hit) — the SHAPE is fully content.
    to_hit:
      label: Attack
      dice: "1d20"
      bonus: ["attr", "$actor.accuracy"]
      vs: ["attr", "$target.evasion"]
      bands:
        - {face_eq: 20, label: crit}
        - {face_eq: 1, label: miss}
        - {margin_min: 0, label: hit}
        - {label: miss}
    # AVOIDANCE LADDER ([G-F]): an ordered list of roll-under-skill checks; the FIRST success negates the
    # swing. A roll-under uses `max: <skill>` (total <= skill => success). A ladder of dodge then parry
    # then block; a defender whose parry/block derive to 0 auto-fails that rung (roll-under-0 is
    # impossible on 1d100) — gear-gating with NO engine predicate ([G-C]). Each band's LABEL is the verb
    # the combat message reads (dodge/parry/block).
    avoidance:
      - label: Dodge
        dice: "1d100"
        bands:
          - {max: ["attr", "$actor.dodge"], label: dodge}
          - {label: fail}
      - label: Parry
        dice: "1d100"
        bands:
          - {max: ["attr", "$actor.parry"], label: parry}
          - {label: fail}
      - label: Block
        dice: "1d100"
        bands:
          - {max: ["attr", "$actor.block"], label: block}
          - {label: fail}
    # DAMAGE BONUS ([G-A]): weapon dice (from the wielded Weapon) + strength_bonus + damroll, scoped to
    # the attacker ($actor). This is what makes a STR-heavy fighter hit harder — as CONTENT, no Lua.
    damage_bonus: ["+", ["attr", "$actor.strength_bonus"], ["attr", "$actor.damroll"]]

zones:
  - ref: midgaard
    name: The City of Midgaard
    start_room: midgaard:room:temple
    # Repop cadence (seconds): the zone's reset script re-runs on this stride (reset.go startRepop), so a
    # picked-up longsword / spent torches respawn. 90s is a sane starter pace — long enough not to dupe
    # under a player's feet, short enough that the world recovers between visits.
    reset_secs: 90
    rooms:
      - ref: midgaard:room:temple
        name: The Temple Square
        long: >-
          A broad plaza of worn flagstones stretches before the great temple. Pilgrims
          murmur in the shade of its columns.
        exits:
          north: midgaard:room:market
      - ref: midgaard:room:market
        name: Market Square
        long: Stalls crowd the square and merchants cry their wares over the din of haggling.
        exits:
          south: midgaard:room:temple
          north: darkwood:room:grove   # cross-zone exit
    item_prototypes:
      - ref: midgaard:obj:torch
        keywords: [torch, wooden]
        short: a wooden torch
        long: A wooden torch lies here, its pitch cold.
        physical: {weight: 2, material: wood}
      - ref: midgaard:obj:helmet
        keywords: [helmet, iron]
        short: an iron helmet
        long: An iron helmet rests here.
        physical: {weight: 3, material: iron}
        wearable: {locations: [head]}
      - ref: midgaard:obj:sword
        keywords: [sword, steel, long]
        short: a steel longsword
        long: A steel longsword lies here.
        physical: {weight: 5, material: steel}
        wearable: {locations: [wield]}
        weapon: {dice_num: 2, dice_size: 6, damage_type: slash, class: sword, attack_verb: slash}
      - ref: midgaard:obj:chest
        keywords: [chest, oak, wooden]
        short: a wooden chest
        long: A heavy wooden chest sits here.
        physical: {weight: 40, material: oak}
        container: {capacity: 10, closed: true}
    # Reset placements: instances spawned onto the market floor at zone boot, exactly as the
    # old newDemoZone Move(z.spawn(...), marketEntity) calls did. None render in lookRoom, so
    # the demo's room text is unchanged; count==5 torches exercises the flyweight herd.
    resets:
      - {op: spawn_item, proto: midgaard:obj:torch,  room: midgaard:room:market, count: 5}
      - {op: spawn_item, proto: midgaard:obj:helmet, room: midgaard:room:market}
      - {op: spawn_item, proto: midgaard:obj:sword,  room: midgaard:room:market}
      - {op: spawn_item, proto: midgaard:obj:chest,  room: midgaard:room:market}

  - ref: darkwood
    name: The Darkwood
    start_room: darkwood:room:grove
    # Repop cadence (seconds): a killed goblin / goblin-chief and their loot respawn on this stride so the
    # zone stays playable after a kill (reset.go startRepop re-runs the reset script). 90s starter pace.
    reset_secs: 90
    rooms:
      - ref: darkwood:room:grove
        name: A Moonlit Grove
        long: Silver birches ring a still clearing; the air hums with quiet magic.
        exits:
          south: midgaard:room:market   # back across the shard boundary
          north: darkwood:room:hollow
      - ref: darkwood:room:hollow
        name: A Dark Hollow
        long: The trees crowd close and the moonlight fails. Something rustles, unseen.
        exits:
          south: darkwood:room:grove
          north: darkwood:room:lair
      - ref: darkwood:room:lair
        name: A Reeking Lair
        long: Bones and gnawed scraps litter a foul den. The stench of goblin is overpowering.
        exits:
          south: darkwood:room:hollow
    item_prototypes:
      # The goblin's loot: a rusty knife it carries (armed via the reset `into` the mob). When the goblin
      # dies (Phase 6.3b) its inventory flows into its corpse, so `get all corpse` recovers the knife.
      - ref: darkwood:obj:rusty-knife
        keywords: [knife, rusty]
        short: a rusty knife
        long: A rusty, notched knife lies here.
        physical: {weight: 1, material: iron}
        wearable: {locations: [wield]}
        weapon: {dice_num: 1, dice_size: 4, damage_type: slash, class: knife, attack_verb: stab}
    # A combat mob (Phase 6.3a/b): the goblin carries a Living block (its stat sheet + the `melee` combat
    # profile) and a Weapon (its natural attack dice). `kill goblin` runs the full swing pipeline against
    # it; at 0 hp it dies, drops a lootable corpse holding its rusty knife, and fires OnKill (Phase 6.3b).
    # The lair goblin sets `aggressive: 1` so it initiates combat the moment a player enters its room.
    # NOTHING engine-side names "goblin"/"corpse"/"loot" — it is all data, like every item.
    mob_prototypes:
      - ref: darkwood:mob:goblin
        keywords: [goblin, small]
        short: a small goblin
        long: A wiry goblin bares its teeth, clutching a rusty knife.
        weapon: {dice_num: 1, dice_size: 6, damage_type: slash, class: knife, attack_verb: stab}
        living:
          combat_profile: melee
          attributes:
            # A STARTER mob (the hollow goblin): tuned so a FRESH, unarmed player kills it in ~4-8 rounds
            # without dying. Low hp (constitution 1 => max_hp 15), no soak, low evasion/dodge so a bare-
            # handed 1d4 punch reliably connects. The goblin still hits back (str 12, 1d6 natural weapon)
            # so the death path is exercised, but it is not the over-tuned slog the lair chief is. With the
            # engine's no-regen-in-combat default (resource regen_in_combat false), its hp no longer claws
            # back the player's per-round damage mid-fight.
            strength: 12           # str_bonus +1 on its bite-back
            constitution: 1        # max_hp = 1*10 + 1*5 = 15
            level: 1
            accuracy: 2
            damroll: 0
            attacks: 1
            evasion: 6             # low -> a fresh player's d20 attack lands almost every round
            dodge: 5              # ~5% dodge on the 1d100 roll-under (a rare whiff, not a slog)
            parry: 0              # no parry skill -> roll-under-0 auto-fails ([G-C], gear-gated by 0)
            block: 0              # no shield -> block auto-fails
            soak_slash: 0         # a STARTER mob: no soak (the longsword/knife bite full damage)
      # An AGGRESSIVE goblin (Phase 6.3b): `aggressive: 1` is a CONTENT number the engine reads to make
      # the mob initiate combat on a player entering its room (death.go aggroOnEntry) — no engine flag.
      - ref: darkwood:mob:goblin-chief
        keywords: [goblin, chief, large]
        short: a goblin chief
        long: A scarred goblin chief looms here, snarling at all who approach.
        weapon: {dice_num: 1, dice_size: 8, damage_type: slash, class: knife, attack_verb: slash}
        living:
          combat_profile: melee
          attributes:
            strength: 16
            constitution: 10       # max_hp = 10*10 + 1*5 = 105
            level: 1
            accuracy: 4
            damroll: 2
            attacks: 1
            evasion: 8
            dodge: 10
            parry: 0
            block: 0
            soak_slash: 2
            aggressive: 1          # initiates combat on a player entering the room
            max_reactions: 1       # [G9] one reaction/round -> ONE opportunity attack on a fleeing foe
    resets:
      - {op: spawn_mob, proto: darkwood:mob:goblin, room: darkwood:room:hollow, count: 1}
      # Arm the goblin with its rusty knife: the item spawns INTO the goblin's inventory (reset `into` a
