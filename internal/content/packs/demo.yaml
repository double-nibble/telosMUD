# The `demo` content pack — the midgaard + darkwood world, transcribed VERBATIM from the
# old internal/world/world.go newDemoZone()/defineTorch()/defineHelmet()/defineSword()/
# defineChest() Go authoring. This file is the source of truth for the demo world the unit
# tests load (embedded via internal/content/demo.go) and for `make seed` (imported into the
# Postgres `pack='demo'` rows for the live stack).
#
# HARD CONSTRAINT (Phase 4.1): the rendered demo world must stay byte-identical — room
# names, long descriptions, exit display order, item keywords/short/long, and the market
# floor item placements must match the old Go authoring exactly. The parity test
# (content_parity_test.go) diffs the prototypes this pack produces against newDemoZone's
# output before that authoring was deleted; keep it green when editing this file.
#
# Both demo zones (midgaard + darkwood) ship together so the cross-zone exit
# market --north--> darkwood:room:grove satisfies the exits.to_room FK when seeded.

pack: demo

# Pack-GLOBAL definitions (Phase 5.1, docs/ABILITIES.md §1): attributes/resources/damage-types are
# zone-independent — they belong to the pack, not to Midgaard. The engine knows the KIND; these rows
# give the instances. Stripping the pack (bare-engine boot) leaves zero of these and the server still
# runs — a stat read just returns 0.
attributes:
  # Primary stats: literal-base attributes (point-buy/level bases override these per character).
  # stat: true surfaces them in the GMCP Char.Stats HUD panel (Phase 9.2); derived/internal attributes
  # below leave it false so they stay out of the panel.
  - {ref: strength,     display_name: Strength,     value_kind: int, default_base: {lit: 10}, stat: true}
  - {ref: intellect,    display_name: Intellect,    value_kind: int, default_base: {lit: 10}, stat: true}
  - {ref: constitution, display_name: Constitution, value_kind: int, default_base: {lit: 10}, stat: true}
  - {ref: level,        display_name: Level,         value_kind: int, default_base: {lit: 1}, min: 1, stat: true}
  # xp is the progress attribute for the hero_advancement track (Phase 11.2): advance_track raises it and
  # the track machinery levels the character when it crosses a threshold. Just an ordinary attribute.
  - {ref: xp,           display_name: Experience,    value_kind: int, default_base: {lit: 0}, min: 0}
  # leatherworking (the skill LEVEL) + leatherworking_xp (its progress) drive the Phase-13.3 use-based
  # crafting skill track: each craft fires OnSkillUse -> advance_track, raising the xp; crossing a threshold
  # levels the skill. Ordinary attributes, like xp/level above.
  - {ref: leatherworking,    display_name: Leatherworking,    value_kind: int, default_base: {lit: 0}, min: 0}
  - {ref: leatherworking_xp, display_name: Leatherworking XP, value_kind: int, default_base: {lit: 0}, min: 0}
  # Derived attributes: base is a prefix-AST formula evaluated against OTHER attrs (recursive).
  #   max_hp   = constitution*10 + level*5
  #   max_mana = intellect*8 + level*3
  - ref: max_hp
    display_name: Maximum Health
    value_kind: derived
    default_base:
      expr: ["+", ["*", ["attr", constitution], 10], ["*", ["attr", level], 5]]
    min: 1
  - ref: max_mana
    display_name: Maximum Mana
    value_kind: derived
    default_base:
      expr: ["+", ["*", ["attr", intellect], 8], ["*", ["attr", level], 3]]
    min: 0

  # --- Combat attributes (Phase 6.3a, docs/COMBAT.md §4) — the ROM-style conventional set. The ENGINE
  # names none of these; the swing pipeline runs whatever check/formula the combat profile authored,
  # and these are the attributes those formulas read. A pack with none = no combat (the bare case).
  # Offense:
  - {ref: accuracy,  display_name: Accuracy,  value_kind: int, default_base: {lit: 0}}
  - {ref: damroll,   display_name: Damage Roll, value_kind: int, default_base: {lit: 0}}
  - {ref: attacks,   display_name: Attacks per Round, value_kind: int, default_base: {lit: 1}, min: 1}
  - {ref: crit_mult, display_name: Critical Multiplier, value_kind: float, default_base: {lit: 2}}
  # unarmed_dice_num / unarmed_dice_size: the dice an entity's BARE-HANDED swing rolls when it wields no
  # weapon and carries no natural Weapon component (buildSwingDamageOp). A fresh, unarmed player would
  # otherwise deal bonus-only damage (~0 at STR 10); these give it a real 1d6 punch. CONTENT-OVERRIDABLE
  # via the normal mod-stack — a monk class / brass-knuckles affect raises them, NO engine predicate. The
  # engine substitutes a tiny default (1d3) only when a pack defines neither, so a bare pack still hits.
  - {ref: unarmed_dice_num,  display_name: Unarmed Dice Count, value_kind: int, default_base: {lit: 1}, min: 1}
  - {ref: unarmed_dice_size, display_name: Unarmed Dice Size,  value_kind: int, default_base: {lit: 6}, min: 1}
  # strength_bonus = (strength - 10) / 2  (5e-ish ability mod; the [G-A] damage bonus reads it). floor
  # via the int value_kind truncation in the formula evaluator's consumers; the swing adds it to damage.
  - ref: strength_bonus
    display_name: Strength Bonus
    value_kind: int
    default_base:
      expr: ["floor", ["/", ["-", ["attr", strength], 10], 2]]
  # Defense:
  - {ref: evasion, display_name: Evasion, value_kind: int, default_base: {lit: 10}}
  - {ref: dodge,   display_name: Dodge,   value_kind: int, default_base: {lit: 0}}
  # parry/block GATE on gear (a wielded weapon / a held shield) via deriving to 0 when ungeared ([G-C]);
  # this demo leaves them as flat content bases (a sword-wielding mob authors a positive parry directly).
  - {ref: parry, display_name: Parry, value_kind: int, default_base: {lit: 0}}
  - {ref: block, display_name: Block, value_kind: int, default_base: {lit: 0}}
  # soak_slash: flat slash-damage reduction ([G-B]). The swing's mitigate() subtracts soak_<type>; armor
  # would feed this through the mod-stack. A flat base here models a tough hide / worn plate.
  - {ref: soak_slash, display_name: Slash Soak, value_kind: int, default_base: {lit: 0}}
  # combat_order: the [G-G] iteration-order key the round driver sorts by (default 0 => simultaneous,
  # the gather order is preserved). An OnEnterCombat initiative check would write this; the demo leaves
  # it at 0 (no initiative) — the simultaneous default the acceptance gate validated.
  - {ref: combat_order, display_name: Combat Order, value_kind: int, default_base: {lit: 0}}
  # aggressive: a CONTENT flag (a number the engine reads, P6-D6) — a mob with aggressive > 0 initiates
  # combat on a player entering its room (death.go aggroOnEntry). Default 0 (passive); a mob's Living
  # block overrides it to 1. The engine never names "aggressive"; it reads whatever this attribute is.
  - {ref: aggressive, display_name: Aggressive, value_kind: int, default_base: {lit: 0}}
  # max_reactions: the cap on the per-round REACTION budget ([G9], Phase 6.4b). Default 0 => a creature
  # has NO reactions (no opportunity attacks); a mob's Living block overrides it (the goblin chief sets 1,
  # the 5e "one reaction per round" rule). The `reactions` resource's max derives from this — so only a
  # creature whose content grants reactions gets the OnLeaveRoom opportunity attack. The engine names no
  # "reactions"; it reads this attribute as the resource cap, exactly like max_hp caps hp.
  - {ref: max_reactions, display_name: Max Reactions, value_kind: int, default_base: {lit: 0}}
  # Saving-throw attributes ([G2]/[G12]): a target's DEX save bonus and a caster's spell save DC. These
  # are what a per-target `check` save (a fireball's save-for-half) reads — `$target.dex_save` vs
  # `$source.spell_dc`. The engine names neither; the check spec authored on the spell reads them.
  - ref: dex_save
    display_name: Dexterity Save
    value_kind: int
    default_base:
      expr: ["floor", ["/", ["-", ["attr", strength], 10], 2]]   # demo: reuse the STR-derived mod shape
  - {ref: spell_dc, display_name: Spell Save DC, value_kind: int, default_base: {lit: 13}}

  # --- Richer-demo combat/defense attributes (content expansion) ----------------------------------
  # ac (armor class): the DEFENSE value the Shield reaction (rx:modify "ac") bumps and a future
  # 5e-style to-hit reads. Flat content base; armor would feed it through the mod-stack (but the equip
  # mod path is a STUB — see the content NOTE in the docs/report). The guardian Shield reaction below
  # raises it for one swing.
  - {ref: ac, display_name: Armor Class, value_kind: int, default_base: {lit: 10}}
  # soak_fire / soak_cold: per-type flat reduction, the [G-B] twins of soak_slash — a fire/cold-warded
  # creature subtracts these in mitigate(). A flat base models worn warding; the demo leaves players at 0
  # (no equip-mod path); a tough creature could author a flat fire/cold soak so a spell barely singes it.
  - {ref: soak_fire, display_name: Fire Soak, value_kind: int, default_base: {lit: 0}}
  - {ref: soak_cold, display_name: Cold Soak, value_kind: int, default_base: {lit: 0}}
  # damroll_bonus: a STR-scaled damage rider an item COULD raise (the "+STR/damroll bonus weapon" the
  # brief asks for is authored as a weapon whose combat profile damage_bonus reads strength_bonus +
  # damroll; this extra attr lets a buff stack onto it). Derived from strength so a STR build hits harder.
  - ref: damroll_bonus
    display_name: Bonus Damage Roll
    value_kind: int
    default_base:
      expr: ["floor", ["/", ["-", ["attr", strength], 10], 2]]
  # wisdom: a primary stat a heal scales off (5e-ish), and the floor a guild channel could gate on.
  - {ref: wisdom, display_name: Wisdom, value_kind: int, default_base: {lit: 10}}
  # heal_power = wisdom*2 + level: the cure spell's bonus formula reads this (a WIS caster heals more).
  - ref: heal_power
    display_name: Heal Power
    value_kind: int
    default_base:
      expr: ["+", ["*", ["attr", wisdom], 2], ["attr", level]]

resources:
  # hp is VITAL: at 0 = death. The on_depleted op-list is the [G-D] death hook (Phase 6.3b): the engine
  # runs it on the dying entity BEFORE die() drops combat / builds the corpse, then proceeds to death.
  # Here it is a pure narration (the engine's own "$n is DEAD!" room line still fires after). Its max is
  # the derived max_hp attribute, so anything that raises constitution/level/max_hp raises the cap.
  - ref: hp
    display_name: Health
    max_attr: max_hp
    vital: true
    regen: 1
    on_depleted:
      - {op: act, to: room, text: "$n collapses, lifeless."}
  - {ref: mana, display_name: Mana,   max_attr: max_mana, vital: false, regen: 1}
  # reactions: the per-round REACTION budget ([G9], Phase 6.4b) AND the carrier of the opportunity-attack
  # handler. `per_round: true` makes the round driver refill it to max (max_reactions) at the START of
  # every combat round, so a reactor gets a bounded number of reactions/round and a spent one does not
  # refill until next round — the SECOND flee in a round provokes nothing. on_event[OnLeaveRoom] is the
  # OPPORTUNITY ATTACK: when an engaged foe flees the room, the engine fires OnLeaveRoom about THIS
  # reactor (subject), with the fleer bound as `other`. The handler (a) checks a reaction is available
  # (`if reactions >= 1`), then (b) SPENDS it (modify_resource self reactions -1) and (c) lands a granted,
  # GATED swing on the fleer (deal_damage with target: other -> the same dealDamage/guardHarmful funnel
  # every harm uses, so a non-consenting player is NOT hit). Pure CONTENT — the engine names no OA.
  - ref: reactions
    display_name: Reactions
    max_attr: max_reactions
    vital: false
    per_round: true
    on_event:
      OnLeaveRoom:
        - op: if
          resource_min: {resource: reactions, min: 1}
          then:
            - {op: modify_resource, resource: reactions, amount: -1}
            - {op: act, to: actor, target: other, text: "$N tries to flee — you lunge with an opportunity attack!"}
            - {op: deal_damage, target: other, type: slash, dice_num: 1, dice_size: 6, bonus: ["attr", "$actor.strength_bonus"]}

damage_types:
  # A small resist matrix: slash resists slash a little (armor-ish), fire is neutral. The shared
  # mitigation pipeline (5.3) reads these; 5.1 only loads them. Multiplier <1 resist, >1 vuln, 0 immune.
  - {ref: slash, display_name: Slashing, color: white, resist: {slash: 0.9}}
  - {ref: fire,  display_name: Fire,     color: red,   resist: {fire: 1.0}}
  # cold: the frostbrand weapon + frost spell type. Neutral self-resist; the wraith carries a flat
  # soak_cold attribute (physical cold warding) so frost bites it less — the soak path, not the matrix.
  - {ref: cold,  display_name: Cold,     color: cyan,  resist: {cold: 1.0}}
  # holy: the smite spell's type. The wraith carries NO soak_holy, so smite's radiant damage bypasses
  # its cold warding entirely — a content-only "undead is weak to holy" effect expressed purely through
  # which soak attributes a mob does (and does not) have. No engine knowledge of "undead" or "holy".
  - {ref: holy,  display_name: Radiant,  color: yellow, resist: {holy: 1.0}}
  # poison already used by the §5 DoT (neutral, no matrix entry needed — kept implicit).

# Affects (status effects, docs/ABILITIES.md §5). The engine's Affected runtime (Phase 5.2) owns their
# duration/stacking/tick/expire and feeds modifiers into derivation + prevents into the tag-CC gate.
# Durations are in PULSES. on_tick op-lists are RESERVED (5.3 wires the gated deal_damage); the tick
# MECHANISM (interval counting + the hook point) is live now.
affects:
  # weaken: a -2 strength debuff, refresh-stacking (a re-cast resets the timer). Exercises a modifier
  # feeding derivation and the refresh stacking mode.
  - ref: weaken
    name: Weakened
    category: curse
    stacking: refresh
    dispellable: true
    body:
      duration: 20
      modifiers:
        - {attr: strength, op: add, value: -2}

  # root: a movement-blocking CC. prevents the "move" tag (a tagged `walk` would be blocked at the
  # lifecycle step-3 gate in 5.3); the prevents-set query is testable standalone this slice.
  - ref: root
    name: Rooted
    category: snare
    stacking: refresh
    dispellable: true
    body:
      duration: 12
      prevents: [move]

  # web: a ROOM-SCOPED affect ([G13]). It attaches to the ROOM (not a creature), ticks over the room's
  # occupants, and lands on anyone who walks IN — rooting (prevents the `move` tag, the same tag-CC a
  # cast root uses) and slowing (-1 dodge) everyone caught in it. scope: room is the only new field; the
  # Affected runtime hosts it. duration 12 pulses; tick interval 2 re-leases the snare on occupants. A
  # web is transient (re-applied by content, never snapshotted).
  - ref: web
    name: Webbed
    category: snare
    scope: room
    stacking: refresh
    dispellable: true
    body:
      duration: 12
      modifiers:
        - {attr: dodge, op: add, value: -1}
      prevents: [move]
      tick:
        interval: 2

  # poison: the §5 example — a DoT. stacks up to 5 (magnitude scales), -2 strength while active, and
  # ticks every 6 pulses. The on_tick deal_damage op-list completes in 5.3 (RESERVED here); the
  # modifiers + stacking + tick interval are live now. Exercises the stack stacking mode.
  - ref: poison
    name: Poisoned
    category: poison
    stacking: stack
    max_stacks: 5
    stack_scope: source
    dispellable: true
    body:
      duration: 30
      modifiers:
        - {attr: strength, op: add, value: -2}
      tick:
        interval: 6
        # The DoT (Phase 5.3): a poison tick is just deal_damage, routed through the SAME gated
        # mitigation pipeline a cast uses. amount 4; the magnitude (stacks) scales it (effectCtx.mag),
        # so a 3-stack poison ticks 12. The damage type is "poison" (neutral — no resist matrix entry).
        on_tick:
          - {op: deal_damage, type: poison, amount: 4}

  # --- Richer-demo affects (content expansion) ----------------------------------------------------

  # bless: a beneficial stat buff — +2 accuracy, +1 ac. ignore-stacking (re-cast is a no-op while up),
  # NON-dispellable-by-curse category (blessing). Applied by the `bless` ability (helpful, self/ally).
  # A genuinely-beneficial affect (only stat-RAISING modifiers, no prevents) — so the harm gate treats
  # casting it on another player as a HELP, not harm.
  - ref: bless
    name: Blessed
    category: blessing
    stacking: ignore
    dispellable: true
    body:
      duration: 40
      modifiers:
        - {attr: accuracy, op: add, value: 2}
        - {attr: ac, op: add, value: 1}

  # bear_endurance: THE max-RAISING resource buff ([resource-clamp ordering]). It raises constitution
  # +4, which feeds the DERIVED max_hp (constitution*10 + level*5), which is the `hp` resource's max_attr
  # — so this buff RAISES the hp cap. The clamp-ordering fix matters: on apply (and on a persistence
  # reattach) the new max must land BEFORE hp is clamped, or a full-hp creature would be clipped to the
  # OLD max. Authored as a buff to exercise exactly that path. Also +1 unarmed dice size (a beefier fist).
  - ref: bear_endurance
    name: Bear's Endurance
    category: blessing
    stacking: refresh
    dispellable: true
    body:
      duration: 50
      modifiers:
        - {attr: constitution, op: add, value: 4}    # -> +40 max_hp via the derived formula
        - {attr: unarmed_dice_size, op: add, value: 1}

  # regen_aura: a HEAL-over-time (the beneficial DoT twin of poison). A positive modify_resource each
  # tick — routed through the SAME resource path, no harm gate (it RESTORES hp). Exercises the tick
  # mechanism for a benefit. Applied by the `renew` heal-buff ability.
  - ref: regen_aura
    name: Renewing
    category: blessing
    stacking: refresh
    dispellable: true
    body:
      duration: 24
      tick:
        interval: 4
        on_tick:
          - {op: heal, resource: hp, amount: 6}

  # frostbite: a DEBUFF DoT — cold damage each tick AND a -2 dodge slow. Harmful: applied via the harm
  # gate (the `frost` spell's apply_affect harmful:true), so it cannot land on a non-consenting player.
  # The cold type means a fire creature shrugs the damage (soak_fire is irrelevant; cold vuln applies).
  - ref: frostbite
    name: Frostbitten
    category: curse
    stacking: refresh
    dispellable: true
    body:
      duration: 18
      modifiers:
        - {attr: dodge, op: add, value: -2}
      tick:
        interval: 3
        on_tick:
          - {op: deal_damage, type: cold, amount: 5}

  # silence: a CASTING CC — prevents the `verbal` tag, so any verbal-tagged cast (fireball/frost/smite/
  # bless are tagged verbal) is BLOCKED at the lifecycle step-3 tag gate while it holds. The mute spell
  # the brief's "movement/silence CC (a prevents tag)" asks for. Harmful (a debuff).
  - ref: silence
    name: Silenced
    category: curse
    stacking: refresh
    dispellable: true
    body:
      duration: 16
      prevents: [verbal]

# Abilities (skills/spells, docs/ABILITIES.md §2). The engine provides the lifecycle + the effect-op
# vocabulary; THIS data is the whole skill — the engine has never heard of "fireball". Adding one is a
# content write, zero engine changes.
abilities:
  # fireball: THE Phase 5.3 milestone. A command-invocation spell, targets an enemy, costs 30 mana,
  # casts instantly (cast_time 0 -> straight to commit), then resolves [deal_damage fire, apply_affect
  # poison]. Its harmful disposition gates it vs a non-consenting player at BOTH choke points
  # (lifecycle step 4 + the in-op guard). 8d6 fire damage flows through the shared mitigation pipeline.
  - ref: fireball
    name: Fireball
    invocation: command
    words: [fireball]
    # [G12] AoE: targeting.area room makes fireball hit EVERY valid living target in the caster's room
    # (the caster is excluded — harmful self-exclusion). The engine loops the on_resolve PER TARGET, and
    # each target funnels guardHarmful INDEPENDENTLY (a consenting foe burns, a non-consenting player in
    # the room is unharmed). mode: enemy keeps the classic `fireball goblin` working, but with an area
    # the keyword is optional — a bare `fireball` blankets the room.
    targeting: {mode: enemy, scope: room, range: 0, disposition: harmful, area: room}
    tags: [cast, verbal, somatic, fire]
    costs:
      - {resource: mana, amount: 30}
    cast_time: 0
    lag: 12
    cooldown: 0
    messages:
      actor: "You hurl a roaring fireball into the room!"
      room: "$n hurls a roaring fireball into the room!"
    # The whole on_resolve is ONE area-scoped `check` op: per target, roll a DEX save vs the caster's
    # spell DC; the save HALVES the damage (the half/full bands). Each target rolls its OWN save and its
    # damage gates on its OWN consent — the Phase-6 milestone "a fireball's save halves its damage across
    # everyone in the room", entirely from content. apply_affect (burn) on a failed save adds the rider.
    on_resolve:
      - op: check
        check:
          label: "Dexterity save"
          dice: "1d20"
          bonus: ["attr", "$target.dex_save"]
          vs: ["attr", "$source.spell_dc"]
          bands:
            # made the save (total >= DC, margin >= 0): HALF damage, no burn.
            - margin_min: 0
              label: save
              ops:
                - {op: deal_damage, type: fire, dice: "4d6"}
            # failed the save: FULL damage + a lingering burn (poison-as-fire DoT rider).
            - label: fail
              ops:
                - {op: deal_damage, type: fire, dice: "8d6"}
                - {op: apply_affect, affect: poison, harmful: true}

  # web: a command spell that conjures the `web` ROOM-scoped affect ([G13]) in the caster's room. mode
  # none (no creature target — the field IS the target); the apply_affect op detects the room-scoped def
  # and attaches it to the room (occupants + entrants get rooted). disposition harmful so the per-occupant
  # landing funnels the gate. No engine knowledge of "web" — the room affect + this ability are content.
  - ref: cast_web
    name: Web
    invocation: command
    words: [web]
    targeting: {mode: none, scope: room, range: 0, disposition: harmful}
    tags: [cast, somatic]
    costs:
      - {resource: mana, amount: 15}
    cast_time: 0
    lag: 12
    cooldown: 0
    messages:
      actor: "You fling a tangle of sticky webs across the room!"
      room: "$n flings a tangle of sticky webs across the room!"
    on_resolve:
      - {op: apply_affect, affect: web}

  # --- Richer-demo abilities (content expansion) --------------------------------------------------

  # frost: a single-target damage spell — 4d6 COLD + a lingering frostbite DoT. The cold type runs the
  # resist matrix + the target's soak_cold (the wraith shrugs some); verbal-tagged so a `silence` affect
  # blocks it. Harmful disposition -> the PvP gate guards it vs a non-consenting player.
  - ref: frost
    name: Frost Bolt
    invocation: command
    words: [frost]
    targeting: {mode: enemy, scope: room, range: 0, disposition: harmful}
    tags: [cast, verbal, somatic, cold]
    costs:
      - {resource: mana, amount: 20}
    cast_time: 0
    lag: 12
    cooldown: 0
    messages:
      actor: "You loose a shard of ice at $N!"
      room: "$n looses a shard of ice at $N!"
    on_resolve:
      - {op: deal_damage, type: cold, dice: "4d6"}
      - {op: apply_affect, affect: frostbite, harmful: true}

  # smite: a HOLY damage spell with a FORMULA bonus ([G-A]) — 2d8 + the caster's wisdom-derived
  # heal_power/2. Demonstrates a bonus formula on deal_damage and a damage TYPE (holy) the wraith has no
  # soak against — it bypasses the wraith's cold warding. Costs mana; verbal/somatic so CC can lock it out.
  - ref: smite
    name: Smite
    invocation: command
    words: [smite]
    targeting: {mode: enemy, scope: room, range: 0, disposition: harmful}
    tags: [cast, verbal, somatic, holy]
    costs:
      - {resource: mana, amount: 18}
    cast_time: 0
    lag: 12
    cooldown: 0
    messages:
      actor: "You call down a searing pillar of light upon $N!"
      room: "$n calls down a searing pillar of light upon $N!"
    on_resolve:
      - {op: deal_damage, type: holy, dice: "2d8", bonus: ["floor", ["/", ["attr", "$source.heal_power"], 2]]}

  # cure: a HEAL (self). HELPFUL disposition (no harm gate). NOTE: the declarative `heal` op only honors a
  # FLAT `amount` (it does NOT roll dice or evaluate a bonus formula — a real gap, see report). To make
  # the heal SCALE with the caster's WIS (the brief's "a heal" that's more than a flat number), cure is a
  # LUA on_resolve: it rolls 2d8 in Lua and adds the caster's heal_power, then restores hp through the
  # SAME gated heal funnel a declarative heal uses. `cure` with no arg heals self.
  - ref: cure
    name: Cure Wounds
    invocation: command
    words: [cure]
    targeting: {mode: self, scope: room, range: 0, disposition: helpful}
    tags: [cast, verbal, somatic]
    costs:
      - {resource: mana, amount: 15}
    cast_time: 0
    lag: 8
    cooldown: 0
    messages:
      actor: "You channel a warm, mending light."
      room: "$n channels a warm, mending light."
    on_resolve_lua: |
      -- 2d8 + the caster's WIS-derived heal_power, healed onto the caster (ctx.target == ctx.actor here).
      local amt = math.random(1, 8) + math.random(1, 8) + ctx.actor:attr("heal_power")
      ctx.actor:heal("hp", amt)

  # bless: a beneficial BUFF — applies the `bless` affect (+accuracy/+ac) to self or an ally. Helpful, so
  # casting it on another player is treated as help (not gated). The brief's "a buff (applies a beneficial
  # affect)". apply_affect on a helpful disposition attaches directly (no debuff path).
  - ref: bless
    name: Bless
    invocation: command
    words: [bless]
    targeting: {mode: self, scope: room, range: 0, disposition: helpful}
    tags: [cast, verbal, somatic]
    costs:
      - {resource: mana, amount: 12}
    cast_time: 0
    lag: 8
    cooldown: 0
    messages:
      actor: "You trace a sigil of protection."
      room: "$n traces a sigil of protection."
    on_resolve:
      - {op: apply_affect, affect: bless}

  # renew: a heal-over-time buff — applies the `regen_aura` (heals hp every tick). Helpful self/ally.
  - ref: renew
    name: Renew
    invocation: command
    words: [renew]
    targeting: {mode: self, scope: room, range: 0, disposition: helpful}
    tags: [cast, verbal, somatic]
    costs:
      - {resource: mana, amount: 14}
    cast_time: 0
    lag: 8
    cooldown: 0
    messages:
      actor: "You weave a slow knot of renewing energy."
      room: "$n weaves a slow knot of renewing energy."
    on_resolve:
      - {op: apply_affect, affect: regen_aura}

  # fortify: applies `bear_endurance` — THE max-RAISING buff (raises constitution -> derived max_hp ->
  # the hp resource cap). A self/ally helpful buff that exercises the resource-clamp ordering.
  - ref: fortify
    name: Fortify
    invocation: command
    words: [fortify]
    targeting: {mode: self, scope: room, range: 0, disposition: helpful}
    tags: [cast, verbal, somatic]
    costs:
      - {resource: mana, amount: 16}
    cast_time: 0
    lag: 8
    cooldown: 0
    messages:
      actor: "You steel your sinews with the endurance of a bear."
      room: "$n's frame seems to swell with vigor."
    on_resolve:
      - {op: apply_affect, affect: bear_endurance}

  # craft_gloves: a PROFESSION CRAFTING ability (Phase 13.3). Double-gated — requires_grant (ownership) AND
  # requires.profession (leatherworking membership); the leatherworking bundle grants both. On resolve it
  # CONSUMES 2 leather scraps and PRODUCES a BOUND pair of leather gloves, and `skill: leatherworking_skill`
  # fires OnSkillUse so each craft advances the trade skill. A non-leatherworker who types `craft` is refused
  # at step-3 ("You lack the training for that craft.") — the requires.profession gate under test.
  - ref: craft_gloves
    name: Craft Gloves
    invocation: command
    words: [craft]
    requires_grant: true
    skill: leatherworking_skill
    targeting: {mode: none, scope: room, range: 0, disposition: neutral}
    requires:
      profession: leatherworking
    messages:
      actor: "You stitch two scraps of leather into a fine pair of gloves."
      room: "$n stitches together a pair of leather gloves."
    on_resolve:
      - {op: consume_item, item: midgaard:obj:leather, amount: 2}
      - {op: produce_item, item: midgaard:obj:leather-gloves, bind: bound}

  # disenchant: a SALVAGE verb (Phase 13.4). Gated on requires.profession (leatherworking) — a non-member is
  # refused at step-3. On resolve it salvage_item's a held steel longsword: the source is CONSUMED even when
  # BOUND (owner deconstruction, §1) and the disenchant_arms table yields a tradeable leather component
  # (uncommon, unbound) + a bound arcane essence (the epic tier binds, D1). No requires_grant — learning the
  # profession alone unlocks the verb.
  - ref: disenchant
    name: Disenchant
    invocation: command
    words: [disenchant]
    targeting: {mode: none, scope: room, range: 0, disposition: neutral}
    requires:
      profession: leatherworking
    messages:
      actor: "You unravel the weave binding the blade and draw out its essence."
      room: "$n unravels a blade into glittering motes of light."
    on_resolve:
      - {op: salvage_item, item: midgaard:obj:sword, table: disenchant_arms}

  # forge_vest: a RECIPE-DRIVEN craft verb (Phase 13.5). Gated on requires.profession (leatherworking) at the
  # verb level; its on_resolve runs craft_recipe(craft:leather_vest), which re-checks the recipe's own gates
  # (profession + skill + the forge STATION room flag, D3), consumes 3 leather + 1 essence, and produces a
  # bound leather vest. Crafting away from the forge — or without the components — is refused by the op.
  - ref: forge_vest
    name: Forge Vest
    invocation: command
    words: [forge]
    requires:
      profession: leatherworking
    targeting: {mode: none, scope: room, range: 0, disposition: neutral}
    messages:
      actor: "You work leather and essence over the forge into a fine vest."
      room: "$n hammers and stitches at the forge."
    on_resolve:
      - {op: craft_recipe, recipe: "craft:leather_vest"}

  # mute: a DEBUFF/CC — applies `silence` (prevents the verbal tag) to an enemy. Harmful disposition, so
  # the PvP harm gate guards it vs a non-consenting player (the harm-gate exercise the brief asks for).
  - ref: mute
    name: Silence
    invocation: command
    words: [mute]
    targeting: {mode: enemy, scope: room, range: 0, disposition: harmful}
    tags: [cast, verbal, somatic]
    costs:
      - {resource: mana, amount: 14}
    cast_time: 0
    lag: 12
    cooldown: 0
    messages:
      actor: "You rip the voice from $N's throat!"
      room: "$n rips the voice from $N's throat!"
    on_resolve:
      - {op: apply_affect, affect: silence, harmful: true}

  # lightning: a LUA on_resolve damage spell. The whole effect is a Lua body: it damages the target via
  # the SAME ctx.target:damage funnel a declarative op uses (so the harm gate + mitigation still apply).
  # Demonstrates the Lua-scripted ability path (Phase 7) as playable content.
  - ref: lightning
    name: Lightning Bolt
    invocation: command
    words: [lightning, bolt]
    targeting: {mode: enemy, scope: room, range: 0, disposition: harmful}
    tags: [cast, verbal, somatic]
    costs:
      - {resource: mana, amount: 22}
    cast_time: 0
    lag: 12
    cooldown: 0
    messages:
      actor: "You hurl a crackling bolt of lightning at $N!"
      room: "$n hurls a crackling bolt of lightning at $N!"
    on_resolve_lua: |
      -- a Lua-scripted spell: roll 5d6 in Lua and deal it through the gated damage funnel.
      local dmg = 0
      for i = 1, 5 do dmg = dmg + math.random(1, 6) end
      ctx.target:damage{amount = dmg, type = "fire"}

  # drain: a LUA on_resolve life-drain — damages the enemy AND heals the caster for half. Demonstrates a
  # Lua ability that reads ctx.source/ctx.target and composes two funneled effects (damage + heal).
  - ref: drain
    name: Life Drain
    invocation: command
    words: [drain]
    targeting: {mode: enemy, scope: room, range: 0, disposition: harmful}
    tags: [cast, verbal, somatic]
    costs:
      - {resource: mana, amount: 20}
    cast_time: 0
    lag: 12
    cooldown: 0
    messages:
      actor: "You siphon the life from $N!"
      room: "$n siphons the life from $N!"
    on_resolve_lua: |
      -- deal 4d6 necrotic-ish (fire type, neutral) then heal the caster for half the damage dealt.
      local dmg = 0
      for i = 1, 4 do dmg = dmg + math.random(1, 6) end
      ctx.target:damage{amount = dmg, type = "fire"}
      ctx.actor:heal("hp", math.floor(dmg / 2))

# Combat profiles (Phase 6.3a, docs/COMBAT.md §3) — the ROM-style to-hit / avoidance / damage SHAPE as
# pure content. The engine runs the pipeline; THIS data is the whole ruleset. `default_combat` names the
# profile a player fights with; a mob names its own via its `living.combat_profile`.
default_combat: melee

combat_profiles:
  - ref: melee
    # TO-HIT: a d20 attack roll + accuracy vs the target's evasion. Bands (top-down, first match wins):
    #   nat-20 -> crit (faceEq, independent of total) ; nat-1 -> miss ; margin>=0 -> hit ; else miss.
    # The engine reads only the band LABEL (crit/miss/hit) — the SHAPE is fully content.
    to_hit:
      label: Attack
      dice: "1d20"
      bonus: ["attr", "$actor.accuracy"]
      vs: ["attr", "$target.evasion"]
      bands:
        - {face_eq: 20, label: crit}
        - {face_eq: 1, label: miss}
        - {margin_min: 0, label: hit}
        - {label: miss}
    # AVOIDANCE LADDER ([G-F]): an ordered list of roll-under-skill checks; the FIRST success negates the
    # swing. A roll-under uses `max: <skill>` (total <= skill => success). A ladder of dodge then parry
    # then block; a defender whose parry/block derive to 0 auto-fails that rung (roll-under-0 is
    # impossible on 1d100) — gear-gating with NO engine predicate ([G-C]). Each band's LABEL is the verb
    # the combat message reads (dodge/parry/block).
    avoidance:
      - label: Dodge
        dice: "1d100"
        bands:
          - {max: ["attr", "$actor.dodge"], label: dodge}
          - {label: fail}
      - label: Parry
        dice: "1d100"
        bands:
          - {max: ["attr", "$actor.parry"], label: parry}
          - {label: fail}
      - label: Block
        dice: "1d100"
        bands:
          - {max: ["attr", "$actor.block"], label: block}
          - {label: fail}
    # DAMAGE BONUS ([G-A]): weapon dice (from the wielded Weapon) + strength_bonus + damroll, scoped to
    # the attacker ($actor). This is what makes a STR-heavy fighter hit harder — as CONTENT, no Lua.
    damage_bonus: ["+", ["attr", "$actor.strength_bonus"], ["attr", "$actor.damroll"]]

# Comms channels (Phase 8.3, docs/PHASE8-PLAN.md P8-D3) — CONTENT, not engine. The engine names NO
# channel: `gossip`/`newbie` exist ONLY because this pack defines them; strip the pack (bare-engine
# boot) and there are no channel verbs at all (the empty-boot invariant). Each channel_def gives its
# verb(s), a color/format template (the listener line, $-substituted: $channel/$name/$t), an access
# predicate (who may speak — content, evaluated engine-side against the live entity), and default_on.
channels:
  # gossip: the OOC global chatter channel. Open to everyone (no access predicate), default on. The
  # format renders "[Gossip] <author>: <text>"; the player's text is the $t DATA arg (a `$`/ANSI in it
  # is literal — it can never forge a "[Gossip] Admin:" prefix or inject a control sequence).
  - ref: gossip
    name: Gossip
    words: [gossip, gos]
    color: ""
    format: "[$channel] $name: $t"
    default_on: true
    history: 20
  # newbie: the help/newbie channel. Also open + default-on; a distinct verb/format demonstrates the
  # multi-channel shape. A pack could gate this (e.g. require a "helper" flag or a level floor) via
  # `access`; the demo keeps it open so the journey tests need no flag setup.
  - ref: newbie
    name: Newbie
    words: [newbie, newb]
    format: "[$channel] $name: $t"
    default_on: true
    history: 20
  # guild: a RESTRICTED channel (Phase 8.6 hear-filter makes this safe to ship). access.require_flag
  # gates BOTH speak (channel.go canSpeak) and HEAR (canHear, the 8.6 receiver filter) — only an entity
  # carrying the "guildmember" flag may speak on it OR receive its lines, so a non-member never sees guild
  # chatter even on a shared bus. default_on false: a fresh character is NOT auto-subscribed (and could
  # not hear it anyway). HOW TO GRANT THE FLAG: there is no in-game flag-grant verb (a real gap — see the
  # report); the "guildmember" flag is set out-of-band on a character save (StateJSON `flags`), exactly as
  # the "pvp" consent flag is. A test grants it directly via setFlag(e, "guildmember", true) — see
  # TestChannelAccessDenied's pattern. This closes the "no restricted channel until 8.6" guardrail.
  - ref: guild
    name: Guild
    words: [guild, gu]
    format: "[$channel] $name: $t"
    access:
      require_flag: guildmember
    default_on: false
    history: 20

# regions: content-defined groupings of member zones (Phase 10.3, docs/WORLD-EVENTS.md §1). A region's
# supra-zone state is owned by a region director; member zones keep a cached read-replica of it and signal
# UP to the director (10.3b/c). A region may span several zones (region ≠ shard). The demo groups the two
# overworld zones into a "heartlands" region; the crypt is left region-less (it has only the world scope).
regions:
  - ref: heartlands
    name: The Heartlands
    zones: [midgaard, darkwood]

# tracks: content-defined advancement tracks (Phase 11.2). hero_advancement is an XP→level track: as a
# character's xp crosses each threshold, the matching step's grant op-list runs once — bumping level + a
# stat. This is the XP-auto mode (the OnKill→advance_track wiring is 11.3); the same machinery expresses
# train-at-trainer / point-buy / use-based (11.5) by changing WHICH event feeds advance_track.
tracks:
  - ref: hero_advancement
    progress_attr: xp
    level_attr: level
    thresholds: [100, 250, 500]
    steps:
      - [ {op: modify_attribute_base, attr: level, amount: 1}, {op: modify_attribute_base, attr: strength, amount: 1} ]
      - [ {op: modify_attribute_base, attr: level, amount: 1}, {op: modify_attribute_base, attr: constitution, amount: 1} ]
      - [ {op: modify_attribute_base, attr: level, amount: 1}, {op: modify_attribute_base, attr: strength, amount: 2} ]
  # leatherworking_skill: a USE-BASED crafting track (Phase 13.3). A craft ability tagged `skill:
  # leatherworking_skill` fires OnSkillUse on each successful craft, advancing leatherworking_xp; crossing a
  # threshold raises the leatherworking level. The profession bundle grants this track on learn.
  - ref: leatherworking_skill
    progress_attr: leatherworking_xp
    level_attr: leatherworking
    thresholds: [2, 5]
    steps:
      - [ {op: modify_attribute_base, attr: leatherworking, amount: 1} ]
      - [ {op: modify_attribute_base, attr: leatherworking, amount: 1} ]

# bundles: content-defined class/race templates (Phase 11.4b). A bundle is a set of grants applied as a
# unit — apply_bundle("fighter") raises stats, sets a flag, and grants the hero_advancement track. Chargen
# (Phase 14) picks a class+race and applies their bundles; the engine knows only "apply the grants".
bundles:
  - ref: fighter
    kind: class
    grants:
      - {op: modify_attribute_base, attr: strength, amount: 3}
      - {op: set_flag, flag: martial}
      - {op: grant_track, track: hero_advancement}
  - ref: elf
    kind: race
    grants:
      - {op: modify_attribute_base, attr: intellect, amount: 2}
      - {op: set_flag, flag: darkvision}
  # dwarf + mage give the chargen picker (Phase 14.8) a real choice — a second race + class — so the form
  # demonstrates content-driven selection (adding one is a content write, no code change).
  - ref: dwarf
    kind: race
    grants:
      - {op: modify_attribute_base, attr: constitution, amount: 2}
      - {op: set_flag, flag: stout}
  - ref: mage
    kind: class
    grants:
      - {op: modify_attribute_base, attr: intellect, amount: 3}
      - {op: set_flag, flag: arcane}
      - {op: grant_track, track: hero_advancement}
  # leatherworking: a PROFESSION bundle (Phase 13.3, fork #2 — a profession is just a bundle, not a new def
  # table). Learning it grants the craft verb (grant_ability), the use-based skill track (grant_track), and
  # enrolls the entity in the trade (learn_profession — the membership the requires.profession gate + the D2
  # cap read). apply_bundle("leatherworking") does all three as a unit.
  - ref: leatherworking
    kind: profession
    grants:
      - {op: grant_ability, ability: craft_gloves}
      - {op: grant_track, track: leatherworking_skill}
      - {op: learn_profession, profession: leatherworking}

# chargen: the content-defined character-generation flow (Phase 14.8). An ordered list of STEPS the website
# walks — content drives HOW generation works, the engine knows only the step KINDS. This demo flow is 5e-style:
# pick a race, pick a class, then a 27-point point-buy over the three stats. A roll-stats or standard-array MUD
# would ship a different step list with NO code change. telos-account reads this to render + validate the form;
# the WORLD applies the result (chosen bundles + bought stats) on the character's first spawn.
chargens:
  - ref: demo:chargen
    steps:
      - {kind: bundle_choice, id: race,  prompt: "Choose your race",  bundle_kind: race,  pick: 1}
      - {kind: bundle_choice, id: class, prompt: "Choose your class", bundle_kind: class, pick: 1}
      - kind: point_buy
        id: attributes
        prompt: "Allocate your attributes (27 points)"
        attributes: [strength, intellect, constitution]
        points: 27
        base: 8
        min: 8
        max: 15
        # cost: cumulative points to raise a stat to the target value from base (the 5e point-buy curve).
        cost: {"8": 0, "9": 1, "10": 2, "11": 3, "12": 4, "13": 5, "14": 7, "15": 9}

# rarity_tiers: the ordered rarity ladder the loot resolver weights + filters by (Phase 12.1). order is
# the ordinal a roll's quality_floor compares; weight is the tier's default pool weight; color renders it.
rarity_tiers:
  - {ref: common,   order: 0, weight: 100, color: white}
  - {ref: uncommon, order: 1, weight: 30,  color: green}
  - {ref: rare,     order: 2, weight: 5,   color: blue}
  # epic is the TOP tier + the Phase-13.4 bind threshold (D1, binds: true): a salvage component of this tier
  # is bound on creation — the legendary-essence sink that keeps the top end un-buyable. Lower tiers stay
  # tradeable (binds defaults false), feeding the component market.
  - {ref: epic,     order: 3, weight: 1,   color: purple, binds: true}

# loot_tables: independent rolls a mob drops from on death (Phase 12.1). goblin_loot gives a guaranteed
# common torch to every eligible looter plus an independent 25% chance at a rare sword (personal loot).
loot_tables:
  - ref: goblin_loot
    rolls:
      - kind: guaranteed
        pool:
          - {item: midgaard:obj:torch, tier: common}
      - kind: chance
        chance: 0.25
        pool:
          # the rare sword rolls a per-instance quality (Phase 12.3): an item level + 1 strength affix, so
          # two dropped swords differ while the prototype stays shared.
          - item: midgaard:obj:sword
            tier: rare
            quality:
              count: 1
              level_min: 1
              level_max: 10
              affixes:
                - {attr: strength, min: 1, max: 5}
  # disenchant_arms: a SALVAGE table (Phase 13.4) — the salvage_item op rolls it after consuming a source
  # weapon. Two guaranteed rolls: a tradeable mid-tier leather component (uncommon, unbound — feeds the
  # market) + a top-tier arcane essence (epic, which binds on creation via the tier's binds flag — the
  # no-trade sink). Reuses the Phase-12 loot resolver; deterministic under a seeded roll.
  - ref: disenchant_arms
    rolls:
      - kind: guaranteed
        pool:
          - {item: midgaard:obj:leather, tier: uncommon}
      - kind: guaranteed
        pool:
          - {item: midgaard:obj:essence, tier: epic}

# spawn_schedules: long-timer bosses the director spawns on a schedule (Phase 12.4), distinct from per-zone
# resets. The Warden respawns a week after it dies; if its window passed while the director was down, it
# spawns on the director's next startup (spawn_if_overdue). The director broadcasts the spawn DOWN to the
# zone; a zone script reacting to on_world("spawn.boss") does the actual mud.spawn (capstone content).
spawn_schedules:
  - ref: boss:warden
    proto: darkwood:mob:goblin-chief
    zone: darkwood
    interval_after_death_sec: 604800
    on_missed: spawn_if_overdue

# recipes: content-defined crafting recipes (Phase 13.5). craft:leather_vest is a leatherworking recipe
# made at the smithy FORGE station (D3 — the smithy room's `forge` flag): it consumes 3 leather scraps + 1
# arcane essence and produces a BOUND leather vest, its quality scaling with the crafter's leatherworking
# skill (quality_base + skill level). This closes the §9 loop with disenchant — the bound essence a player
# salvaged from an epic feeds straight into this recipe.
recipes:
  - ref: craft:leather_vest
    profession: leatherworking
    # track resolves the skill gate/scaling from leatherworking_skill's level_attr (=leatherworking) live, so
    # the recipe follows the track rather than duplicating the attr; skill stays as the raw-attr fallback.
    track: leatherworking_skill
    skill: leatherworking
    min_skill: 0
    station: forge
    quality_base: 5
    inputs:
      - {item: midgaard:obj:leather, qty: 3}
      - {item: midgaard:obj:essence, qty: 1}
    output: {item: midgaard:obj:leather-vest, bind: bound}
    announce: "A great roar echoes across the land — the Warden has returned!"

zones:
  - ref: midgaard
    name: The City of Midgaard
    start_room: midgaard:room:temple
    # Repop cadence (seconds): the zone's reset script re-runs on this stride (reset.go startRepop), so a
    # picked-up longsword / spent torches respawn. 90s is a sane starter pace — long enough not to dupe
    # under a player's feet, short enough that the world recovers between visits.
    reset_secs: 90
    rooms:
      - ref: midgaard:room:temple
        name: The Temple Square
        coord: [0, 0, 0]   # GMCP minimap [x,y,z] (Phase 9.3b); the grid origin
        long: >-
          A broad plaza of worn flagstones stretches before the great temple. Pilgrims
          murmur in the shade of its columns.
        # PARITY: the temple's name/long/exit-order MUST stay byte-identical (content_parity_test).
        # New exits (west to the guild hall) are additive — the test asserts the north exit only.
        exits:
          north: midgaard:room:market
          west: midgaard:room:guildhall
      - ref: midgaard:room:market
        name: Market Square
        coord: [0, 1, 0]   # north of the temple
        long: Stalls crowd the square and merchants cry their wares over the din of haggling.
        # PARITY: south+north exits MUST match the test's expected map exactly (it asserts both).
        # Adding `east` to the smithy here would BREAK the parity exits DeepEqual — so the smithy is
        # reached from the GUILD HALL instead, keeping market's exit map exactly {south, north}.
        exits:
          south: midgaard:room:temple
          north: darkwood:room:grove   # cross-zone exit (intra-shard transfer when co-hosted)
      # --- richer-demo midgaard rooms (no floor placements that touch the parity-checked market/temple) ---
      - ref: midgaard:room:guildhall
        name: The Adventurers' Guild
        coord: [-1, 0, 0]  # west of the temple
        long: >-
          Banners of a dozen companies hang from the rafters of this vaulted hall. A
          notched practice dummy stands in one corner, and a door east leads to the smithy.
        exits:
          east: midgaard:room:temple
          north: midgaard:room:smithy
          down: crypt:room:entrance     # cross-zone stair (intra-shard transfer when co-hosted)
      - ref: midgaard:room:smithy
        name: The Smithy
        coord: [-1, 1, 0]  # north of the guild hall
        # flags: forge — the Phase-13.5 crafting STATION (D3: a station is a room flag). A recipe with
        # station: forge can only be crafted while standing here; recipes with no station craft anywhere.
        flags: [forge]
        long: >-
          Heat rolls off the forge in waves. Racks of weapons and armor line the soot-black
          walls, and a hand-lettered sign reads: TAKE WHAT YOU NEED, ADVENTURER.
        exits:
          south: midgaard:room:guildhall
    item_prototypes:
      - ref: midgaard:obj:torch
        keywords: [torch, wooden]
        short: a wooden torch
        long: A wooden torch lies here, its pitch cold.
        physical: {weight: 2, material: wood}
      - ref: midgaard:obj:helmet
        keywords: [helmet, iron]
        short: an iron helmet
        long: An iron helmet rests here.
        physical: {weight: 3, material: iron}
        wearable: {locations: [head]}
      - ref: midgaard:obj:sword
        keywords: [sword, steel, long]
        short: a steel longsword
        long: A steel longsword lies here.
        physical: {weight: 5, material: steel}
        wearable: {locations: [wield]}
        weapon: {dice_num: 2, dice_size: 6, damage_type: slash, class: sword, attack_verb: slash}
        # Phase 13.1: the rare loot sword binds to its looter (BoP) + is tagged magical for disenchant (13.4).
        bind: bind_on_pickup
        tier: rare
        tags: [magical]
      # A stackable crafting material (Phase 13.2): leather scraps merge up to 20 per stack. Disenchant/
      # salvage (13.4) produce these; recipes (13.5) consume them.
      - ref: midgaard:obj:leather
        keywords: [leather, scrap, scraps]
        short: a pile of leather scraps
        long: A pile of leather scraps lies here.
        physical: {weight: 1, material: leather}
        tags: [material]
        material: {max_stack: 20, type: leather}
      # essence: the Phase-13.4 top-tier salvage component (an arcane essence). A stackable material like
      # leather, but the disenchant_arms table rolls it at the `epic` tier, whose binds flag makes each
      # essence bind on creation — the no-trade legendary sink (D1). The item proto carries no bind rule of
      # its own; the binding comes from the salvage tier.
      - ref: midgaard:obj:essence
        keywords: [essence, arcane, mote]
        short: a mote of arcane essence
        long: A faintly glowing mote of arcane essence hovers here.
        physical: {weight: 0, material: aether}
        tags: [material, essence]
        material: {max_stack: 50, type: essence}
      - ref: midgaard:obj:chest
        keywords: [chest, oak, wooden]
        short: a wooden chest
        long: A heavy wooden chest sits here.
        physical: {weight: 40, material: oak}
        container: {capacity: 10, closed: true}

      # --- richer-demo gear (the smithy stock) ----------------------------------------------------
      # NOTE (real gap, see report): worn/wielded gear does NOT currently contribute attribute
      # modifiers — the equip path (cmdWear/cmdWield) is a STUB that sets the slot but adds NO
      # modSource and fires NO OnEquip event (there is no such event kind). So an item CANNOT raise a
      # stat / grant an affect / raise a resource max purely by being worn. The gear below carries the
      # mechanics it CAN express today: a WEAPON's damage dice + type, which DO flow into combat (the
      # combat profile's damage_bonus already adds strength_bonus + damroll on top). The armor/accessory
      # stat-mods + the "max-raising buff on equip" + "resistance on equip" are authored as Wearable
      # flavor PLUS an equivalent ABILITY/affect a player can invoke (fortify = the max-raiser; frost
      # resist would be a soak attr a future equip-mod feeds). This is the one brief item the content
      # shapes can't fully express — flagged, not hacked.

      # warhammer: a heavy STR weapon — bigger dice (1d10) than the longsword; its extra punch comes
      # from the combat profile's damage_bonus (strength_bonus + damroll), so a STR build swings harder.
      - ref: midgaard:obj:warhammer
        keywords: [warhammer, hammer, heavy]
        short: a heavy warhammer
        long: A heavy iron warhammer leans against the rack.
        physical: {weight: 12, material: iron}
        wearable: {locations: [wield]}
        weapon: {dice_num: 1, dice_size: 10, damage_type: slash, class: mace, attack_verb: smash}
      # frostbrand: a cold-damage sword (its swings deal COLD — a different damage type runs through the
      # resist matrix + the target's soak_cold — the wraith's cold warding blunts it, others feel it).
      - ref: midgaard:obj:frostbrand
        keywords: [frostbrand, sword, icy]
        short: an icy frostbrand sword
        long: A longsword rimed with frost rests here, breathing cold.
        physical: {weight: 5, material: steel}
        wearable: {locations: [wield]}
        weapon: {dice_num: 2, dice_size: 6, damage_type: cold, class: sword, attack_verb: freeze}
      # leather armor across MULTIPLE wear slots. NOTE (real gap, see report): the wear-slot enum is a
      # CLOSED engine set — only head/body/hands/feet/wield/hold exist (no legs/neck/finger/waist/arms).
      # So "armor pieces across multiple wear slots" spans the THREE armor slots the engine has: body,
      # hands, feet (+ head, already covered by the original helmet). An accessory `neck`/`finger` slot
      # is NOT expressible. Stat-mods on equip are the separate equip-mod gap above.
      - ref: midgaard:obj:leather-vest
        keywords: [vest, leather, armor]
        short: a studded leather vest
        long: A studded leather vest hangs on a peg.
        physical: {weight: 8, material: leather}
        wearable: {locations: [body]}
      - ref: midgaard:obj:leather-gloves
        keywords: [gloves, leather]
        short: a pair of leather gloves
        long: A pair of supple leather gloves lies folded here.
        physical: {weight: 2, material: leather}
        wearable: {locations: [hands]}
      - ref: midgaard:obj:leather-boots
        keywords: [boots, leather]
        short: a pair of leather boots
        long: A pair of scuffed leather boots sits by the forge.
        physical: {weight: 3, material: leather}
        wearable: {locations: [feet]}
      # iron shield: a HELD off-hand shield (the block-avoidance rung gates on a held shield via the
      # combat profile; today block derives from a flat attr, but the shield is the wearable that a
      # gear-gated block would key off — the slot mechanism is real).
      - ref: midgaard:obj:shield
        keywords: [shield, iron, round]
        short: a round iron shield
        long: A round iron shield is propped against the anvil.
        physical: {weight: 10, material: iron}
        wearable: {locations: [hold]}
    mob_prototypes:
      # quartermaster: a LUA GREETER mob (Phase 7.4c). on("greet") fires when a player enters its room;
      # it greets the newcomer BY NAME (ev.actor:name()) and remembers via self.state so it greets each
      # player only once. Pure content scripting + per-instance state. Stands in the guild hall.
      - ref: midgaard:mob:quartermaster
        keywords: [quartermaster, dwarf, smith]
        short: the guild quartermaster
        long: A broad-shouldered dwarf in a leather apron looks you over appraisingly.
        lua: |
          state.greeted = {}
          on("greet", function(ev)
            local id = ev.actor:id()
            if not state.greeted[id] then
              state.greeted[id] = true
              self:say("Welcome, " .. ev.actor:name() .. "! Take what you need from the smithy north.")
            end
          end)
    # Reset placements. PARITY: the market floor placements MUST stay EXACTLY the original 4 ops
    # (torch x5 + helmet + sword + chest) and the temple MUST stay empty — the instance-placement
    # parity test asserts both. New gear/mob placements go in the SMITHY / GUILD HALL only.
    resets:
      - {op: spawn_item, proto: midgaard:obj:torch,  room: midgaard:room:market, count: 5}
      - {op: spawn_item, proto: midgaard:obj:helmet, room: midgaard:room:market}
      - {op: spawn_item, proto: midgaard:obj:sword,  room: midgaard:room:market}
      - {op: spawn_item, proto: midgaard:obj:chest,  room: midgaard:room:market}
      # the smithy stock — the new gear, on the smithy floor (look in the smithy to find it):
      - {op: spawn_item, proto: midgaard:obj:warhammer,        room: midgaard:room:smithy, count: 1}
      - {op: spawn_item, proto: midgaard:obj:frostbrand,       room: midgaard:room:smithy, count: 1}
      - {op: spawn_item, proto: midgaard:obj:leather-vest,     room: midgaard:room:smithy, count: 1}
      - {op: spawn_item, proto: midgaard:obj:leather-gloves,   room: midgaard:room:smithy, count: 1}
      - {op: spawn_item, proto: midgaard:obj:leather-boots,    room: midgaard:room:smithy, count: 1}
      - {op: spawn_item, proto: midgaard:obj:shield,           room: midgaard:room:smithy, count: 1}
      # the guild quartermaster greeter, in the guild hall:
      - {op: spawn_mob, proto: midgaard:mob:quartermaster, room: midgaard:room:guildhall, count: 1}

  - ref: darkwood
    name: The Darkwood
    start_room: darkwood:room:grove
    # Repop cadence (seconds): a killed goblin / goblin-chief and their loot respawn on this stride so the
    # zone stays playable after a kill (reset.go startRepop re-runs the reset script). 90s starter pace.
    reset_secs: 90
    rooms:
      - ref: darkwood:room:grove
        name: A Moonlit Grove
        long: Silver birches ring a still clearing; the air hums with quiet magic.
        exits:
          south: midgaard:room:market   # back across the shard boundary
          north: darkwood:room:hollow
      - ref: darkwood:room:hollow
        name: A Dark Hollow
        long: The trees crowd close and the moonlight fails. Something rustles, unseen.
        exits:
          south: darkwood:room:grove
          north: darkwood:room:lair
      - ref: darkwood:room:lair
        name: A Reeking Lair
        # A builder-authored color example (Track 1 color): {{TOKEN}} markup renders to ANSI at the edge
        # (a coalesced red+bold warning), or plain text for a `color off` player. Single-quoted so YAML
        # treats the braces literally.
        long: 'Bones and gnawed scraps litter a foul den. The {{FG_GREEN}}stench of goblin{{RESET}} is overpowering, and a {{FG_RED}}{{BOLD}}warning{{RESET}} is scrawled in blood on the wall.'
        # lair is NOT in the content-parity want-map, so adding an east exit here is parity-safe.
        exits:
          south: darkwood:room:hollow
          east: darkwood:room:webtunnel
      - ref: darkwood:room:webtunnel
        name: A Web-Choked Tunnel
        long: >-
          Thick grey webbing drapes every surface of this cramped tunnel. Pale shapes
          twitch in the strands overhead.
        exits:
          west: darkwood:room:lair
          east: darkwood:room:sanctum
      - ref: darkwood:room:sanctum
        name: A Warded Sanctum
        long: >-
          Runes pulse faintly along the walls of this hidden chamber. The air thrums with
          guarded, watchful magic.
        exits:
          west: darkwood:room:webtunnel
    item_prototypes:
      # The goblin's loot: a rusty knife it carries (armed via the reset `into` the mob). When the goblin
      # dies (Phase 6.3b) its inventory flows into its corpse, so `get all corpse` recovers the knife.
      - ref: darkwood:obj:rusty-knife
        keywords: [knife, rusty]
        short: a rusty knife
        long: A rusty, notched knife lies here.
        physical: {weight: 1, material: iron}
        wearable: {locations: [wield]}
        weapon: {dice_num: 1, dice_size: 4, damage_type: slash, class: knife, attack_verb: stab}
    # A combat mob (Phase 6.3a/b): the goblin carries a Living block (its stat sheet + the `melee` combat
    # profile) and a Weapon (its natural attack dice). `kill goblin` runs the full swing pipeline against
    # it; at 0 hp it dies, drops a lootable corpse holding its rusty knife, and fires OnKill (Phase 6.3b).
    # The lair goblin sets `aggressive: 1` so it initiates combat the moment a player enters its room.
    # NOTHING engine-side names "goblin"/"corpse"/"loot" — it is all data, like every item.
    mob_prototypes:
      - ref: darkwood:mob:goblin
        keywords: [goblin, small]
        short: a small goblin
        long: A wiry goblin bares its teeth, clutching a rusty knife.
        weapon: {dice_num: 1, dice_size: 6, damage_type: slash, class: knife, attack_verb: stab}
        living:
          combat_profile: melee
          loot_table: goblin_loot   # Phase 12.1: drops a guaranteed torch + a 25% rare sword on death
          attributes:
            # A STARTER mob (the hollow goblin): tuned so a FRESH, unarmed player kills it in ~4-8 rounds
            # without dying. Low hp (constitution 1 => max_hp 15), no soak, low evasion/dodge so a bare-
            # handed 1d4 punch reliably connects. The goblin still hits back (str 12, 1d6 natural weapon)
            # so the death path is exercised, but it is not the over-tuned slog the lair chief is. With the
            # engine's no-regen-in-combat default (resource regen_in_combat false), its hp no longer claws
            # back the player's per-round damage mid-fight.
            strength: 12           # str_bonus +1 on its bite-back
            constitution: 1        # max_hp = 1*10 + 1*5 = 15
            level: 1
            accuracy: 2
            damroll: 0
            attacks: 1
            evasion: 6             # low -> a fresh player's d20 attack lands almost every round
            dodge: 5              # ~5% dodge on the 1d100 roll-under (a rare whiff, not a slog)
            parry: 0              # no parry skill -> roll-under-0 auto-fails ([G-C], gear-gated by 0)
            block: 0              # no shield -> block auto-fails
            soak_slash: 0         # a STARTER mob: no soak (the longsword/knife bite full damage)
      # An AGGRESSIVE goblin (Phase 6.3b): `aggressive: 1` is a CONTENT number the engine reads to make
      # the mob initiate combat on a player entering its room (death.go aggroOnEntry) — no engine flag.
      - ref: darkwood:mob:goblin-chief
        keywords: [goblin, chief, large]
        short: a goblin chief
        long: A scarred goblin chief looms here, snarling at all who approach.
        weapon: {dice_num: 1, dice_size: 8, damage_type: slash, class: knife, attack_verb: slash}
        living:
          combat_profile: melee
          attributes:
            strength: 16
            constitution: 10       # max_hp = 10*10 + 1*5 = 105
            level: 1
            accuracy: 4
            damroll: 2
            attacks: 1
            evasion: 8
            dodge: 10
            parry: 0
            block: 0
            soak_slash: 2
            aggressive: 1          # initiates combat on a player entering the room
            max_reactions: 1       # [G9] one reaction/round -> ONE opportunity attack on a fleeing foe

      # --- richer-demo darkwood mobs ---------------------------------------------------------------

      # cave spider: a LUA mob that conjures a ROOM-SCOPED web affect ([G13]) in its tunnel. on("enter")
      # fires when anyone walks in; the spider (self) applies `web` — which opApplyAffect detects as
      # room-scoped and routes to applyRoomAffect on the spider's OWN room, rooting/slowing the room's
      # occupants (the per-occupant landing funnels the harm gate, so a non-consenting player is spared
      # the root). This is how a place stays webbed in PLAYABLE content. It also fights (a weak combatant).
      - ref: darkwood:mob:spider
        keywords: [spider, cave, pale]
        short: a pale cave spider
        long: A pale, bristling cave spider crouches amid the webbing.
        weapon: {dice_num: 1, dice_size: 4, damage_type: poison, class: bite, attack_verb: bite}
        living:
          combat_profile: melee
          attributes:
            strength: 10
            constitution: 3        # max_hp = 3*10 + 1*5 = 35
            level: 1
            accuracy: 3
            damroll: 0
            attacks: 1
            evasion: 8
            dodge: 12
            parry: 0
            block: 0
            soak_slash: 0
        lua: |
          on("enter", function(ev)
            -- (re)web the room whenever something enters; self IS in the tunnel, so the room-scoped
            -- web attaches to this room and snares its occupants.
            self:apply_affect("web")
          end)

      # archmage: a COUNTERSPELL reactor (Phase 7.9). Its on_reaction_lua[BeforeCastCommit] fires when ANY
      # creature in the room begins a cast; rx:cancel() VETOES the in-flight cast (the caster pays no cost,
      # resolves no ops). State-gated to ONE counter per combat so it's not an unwinnable wall — after it
      # spends its counter it lets casts through. This is the reaction-model "Counterspell" as playable
      # content. (on_reaction_lua lives on a RESOURCE the mob has — here `mana` — so the handler gathers.)
      - ref: darkwood:mob:archmage
        keywords: [archmage, mage, robed]
        short: a robed archmage
        long: A robed archmage studies you with cold, calculating eyes.
        weapon: {dice_num: 1, dice_size: 6, damage_type: fire, class: staff, attack_verb: blast}
        living:
          combat_profile: melee
          attributes:
            strength: 10
            constitution: 5        # max_hp = 5*10 + 1*5 = 55
            level: 1
            accuracy: 4
            damroll: 0
            attacks: 1
            evasion: 10
            dodge: 8
            parry: 0
            block: 0
            soak_slash: 0
        lua: |
          on("BeforeCastCommit", function(ev, rx)
            -- counter the first hostile cast we witness, then rest (state-gated so it isn't a hard wall).
            if not state.countered then
              state.countered = true
              rx:cancel()
            end
          end)

      # warden: a SHIELD reactor (Phase 7.9). on_reaction_lua[ToHit] fires right before an incoming swing's
      # to-hit roll; rx:modify("ac", +5) raises the warden's AC for the TRIGGERING swing only (it does not
      # persist). State-gated to ONE shield per combat. The reaction-model "Shield" as playable content.
      - ref: darkwood:mob:warden
        keywords: [warden, guardian, armored]
        short: an armored warden
        long: An armored warden stands guard, shield raised and ready.
        weapon: {dice_num: 1, dice_size: 8, damage_type: slash, class: sword, attack_verb: slash}
        living:
          combat_profile: melee
          attributes:
            strength: 14
            constitution: 8        # max_hp = 8*10 + 1*5 = 85
            level: 1
            accuracy: 4
            damroll: 1
            attacks: 1
            evasion: 10
            dodge: 6
            parry: 0
            block: 0
            soak_slash: 3
            ac: 12
        lua: |
          on("ToHit", function(ev, rx)
            if not state.shielded then
              state.shielded = true
              rx:modify("ac", 5)   -- +5 AC for this one swing (does not persist)
            end
          end)

      # wraith: an UNDEAD mob that wards COLD (soak_cold 3) but has NO soak against HOLY — so `smite`
      # (holy) cuts through while `frost` (cold) is blunted. A content-only "undead weak to holy" purely
      # from which soak attributes it carries. Tough hp, a chilling touch. Aggressive so it engages on entry.
      - ref: darkwood:mob:wraith
        keywords: [wraith, undead, shade]
        short: a hollow wraith
        long: A hollow wraith drifts here, trailing tatters of cold shadow.
        weapon: {dice_num: 1, dice_size: 8, damage_type: cold, class: touch, attack_verb: chill}
        living:
          combat_profile: melee
          attributes:
            strength: 13
            constitution: 7        # max_hp = 7*10 + 1*5 = 75
            level: 1
            accuracy: 5
            damroll: 1
            attacks: 1
            evasion: 11
            dodge: 14
            parry: 0
            block: 0
            soak_slash: 1
            soak_cold: 3           # resists physical cold; smite (holy) bypasses it
            aggressive: 1
    resets:
      - {op: spawn_mob, proto: darkwood:mob:goblin, room: darkwood:room:hollow, count: 1}
      # Arm the goblin with its rusty knife: the item spawns INTO the goblin's inventory (reset `into` a
      # mob, reset.go), so its corpse holds it. Script order matters — the goblin must spawn first.
      - {op: spawn_item, proto: darkwood:obj:rusty-knife, into: darkwood:mob:goblin, room: darkwood:room:hollow, count: 1}
      - {op: spawn_mob, proto: darkwood:mob:goblin-chief, room: darkwood:room:lair, count: 1}
      # the cave spider that keeps the web tunnel webbed (room-affect demo):
      - {op: spawn_mob, proto: darkwood:mob:spider, room: darkwood:room:webtunnel, count: 1}
      # the warded sanctum's defenders: the Counterspell archmage, the Shield warden, and the holy-vuln wraith:
      - {op: spawn_mob, proto: darkwood:mob:archmage, room: darkwood:room:sanctum, count: 1}
      - {op: spawn_mob, proto: darkwood:mob:warden,   room: darkwood:room:sanctum, count: 1}
      - {op: spawn_mob, proto: darkwood:mob:wraith,   room: darkwood:room:sanctum, count: 1}

  # A THIRD zone (the crypt) — proves multi-zone-per-shard beyond the original two. It hangs off the
  # midgaard guild hall via a `down` stair (crypt:room:entrance). When a shard hosts midgaard + crypt
  # together the descent is an INTRA-SHARD transfer (transferIn, no handoff); when they live on
  # different shards it is the cross-shard hop. Both paths are the SAME `down` exit — placement decides.
  - ref: crypt
    name: The Forgotten Crypt
    start_room: crypt:room:entrance
    reset_secs: 90
    rooms:
      - ref: crypt:room:entrance
        name: A Crumbling Stair
        long: >-
          Worn steps descend into damp dark. The air is cold and still, and the way up
          returns to the guild hall above.
        exits:
          up: midgaard:room:guildhall   # back to the guild hall (intra-shard transfer when co-hosted)
          north: crypt:room:ossuary
      - ref: crypt:room:ossuary
        name: The Ossuary
        long: >-
          Skulls are stacked in niches from floor to ceiling. Something has been feeding
          here recently.
        exits:
          south: crypt:room:entrance
          north: crypt:room:tomb
      - ref: crypt:room:tomb
        name: A Sealed Tomb
        long: >-
          A great stone sarcophagus dominates this chamber. Faint holy runes ring its lid,
          long since cracked.
        exits:
          south: crypt:room:ossuary
    item_prototypes:
      # the skeleton's loot — a tarnished blade it carries, recovered from its corpse on death.
      - ref: crypt:obj:bone-blade
        keywords: [blade, bone, tarnished]
        short: a tarnished bone blade
        long: A blade of yellowed bone lies here, edge still keen.
        physical: {weight: 3, material: bone}
        wearable: {locations: [wield]}
        weapon: {dice_num: 1, dice_size: 8, damage_type: slash, class: sword, attack_verb: slash}
    mob_prototypes:
      # a skeletal guardian — a starter-to-mid combat mob in the ossuary (undead flavor, holy-vuln target).
      - ref: crypt:mob:skeleton
        keywords: [skeleton, bony, guardian]
        short: a skeletal guardian
        long: A skeletal guardian rattles upright, blade in bony fist.
        weapon: {dice_num: 1, dice_size: 6, damage_type: slash, class: sword, attack_verb: slash}
        living:
          combat_profile: melee
          attributes:
            strength: 13
            constitution: 4        # max_hp = 4*10 + 1*5 = 45
            level: 1
            accuracy: 3
            damroll: 1
            attacks: 1
            evasion: 8
            dodge: 8
            parry: 0
            block: 0
            soak_slash: 1
      # a tomb guardian — the crypt boss, aggressive, with one reaction (an opportunity attack on flee).
      - ref: crypt:mob:tomb-guardian
        keywords: [guardian, tomb, ancient]
        short: an ancient tomb guardian
        long: An ancient guardian of black iron looms over the sarcophagus, unmoving until disturbed.
        weapon: {dice_num: 2, dice_size: 6, damage_type: slash, class: sword, attack_verb: cleave}
        living:
          combat_profile: melee
          attributes:
            strength: 17
            constitution: 9        # max_hp = 9*10 + 1*5 = 95
            level: 1
            accuracy: 5
            damroll: 3
            attacks: 1
            evasion: 9
            dodge: 8
            parry: 0
            block: 0
            soak_slash: 3
            aggressive: 1
            max_reactions: 1
    resets:
      - {op: spawn_mob, proto: crypt:mob:skeleton, room: crypt:room:ossuary, count: 1}
      - {op: spawn_item, proto: crypt:obj:bone-blade, into: crypt:mob:skeleton, room: crypt:room:ossuary, count: 1}
      - {op: spawn_mob, proto: crypt:mob:tomb-guardian, room: crypt:room:tomb, count: 1}
